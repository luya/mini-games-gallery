<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas 互動粒子特效 Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0f19;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        /* UI 控制面板 */
        .control-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px 20px;
            border-radius: 12px;
            color: #fff;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        h3 {
            margin-bottom: 12px;
            font-size: 16px;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            padding-bottom: 5px;
        }
        .btn-group {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }
        button {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s ease;
        }
        button:hover, button.active {
            background: #3b82f6;
            border-color: #60a5fa;
            box-shadow: 0 0 8px rgba(59, 130, 246, 0.5);
        }
        .info {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>

    <div class="control-panel">
        <h3>天氣效果設定</h3>
        <div class="btn-group">
            <button onclick="changePreset('leaves')" id="btn-leaves" class="active">落葉</button>
            <button onclick="changePreset('snow')" id="btn-snow">雪花</button>
            <button onclick="changePreset('rain')" id="btn-rain">小雨</button>
        </div>
        <div class="info">
            <p>💡 <b>滑鼠互動：</b>在畫面上移動滑鼠，粒子會被滑鼠散發出的微型磁場彈開！</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');

        // 滑鼠狀態追蹤
        const mouse = {
            x: null,
            y: null,
            radius: 120 // 影響半徑 (像素)
        };

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        // 滑鼠移出畫面時重置
        window.addEventListener('mouseout', () => {
            mouse.x = null;
            mouse.y = null;
        });

        // 調整畫布大小
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // 當前天氣設定
        let currentPreset = 'leaves';
        const particles = [];
        const maxParticles = 120;

        // 萬用粒子類別
        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * -canvas.height; // 從上方螢幕外生成
                
                // 根據模式設定物理屬性
                if (currentPreset === 'snow') {
                    this.size = Math.random() * 3 + 1.5;
                    this.speedY = Math.random() * 1 + 0.5;
                    this.speedX = Math.random() * 0.4 - 0.2;
                    this.color = 'rgba(255, 255, 255, 0.85)';
                    this.swingSpeed = Math.random() * 0.02 + 0.01;
                    this.swingRange = Math.random() * 1 + 0.5;
                    this.angle = Math.random() * Math.PI * 2;
                } else if (currentPreset === 'rain') {
                    this.size = Math.random() * 1.5 + 0.5; // 雨絲寬度
                    this.length = Math.random() * 15 + 10; // 雨絲長度
                    this.speedY = Math.random() * 8 + 6;
                    this.speedX = -1.5; // 微風向左
                    this.color = 'rgba(174, 219, 255, 0.5)';
                } else { // 預設落葉 (leaves)
                    this.size = Math.random() * 8 + 6;
                    this.speedY = Math.random() * 1.2 + 0.8;
                    this.speedX = Math.random() * 1 - 0.5;
                    // 秋天落葉色調
                    const colors = [
                        'rgba(212, 91, 56, 0.85)',  // 紅橘
                        'rgba(230, 154, 57, 0.85)', // 橘黃
                        'rgba(139, 150, 48, 0.85)'  // 枯綠
                    ];
                    this.color = colors[Math.floor(Math.random() * colors.length)];
                    this.rotation = Math.random() * 360;
                    this.rotationSpeed = Math.random() * 2 - 1;
                    this.swingSpeed = Math.random() * 0.01 + 0.005;
                    this.angle = Math.random() * Math.PI * 2;
                }

                // 滑鼠交互作用的偏移偏移量
                this.offsetX = 0;
                this.offsetY = 0;
            }

            update() {
                // 基礎重力/物理移動
                if (currentPreset === 'snow') {
                    this.angle += this.swingSpeed;
                    this.x += this.speedX + Math.sin(this.angle) * this.swingRange;
                    this.y += this.speedY;
                } else if (currentPreset === 'rain') {
                    this.x += this.speedX;
                    this.y += this.speedY;
                } else { // leaves
                    this.angle += this.swingSpeed;
                    this.x += this.speedX + Math.sin(this.angle) * 0.6;
                    this.y += this.speedY;
                    this.rotation += this.rotationSpeed;
                }

                // 核心：滑鼠物理排斥計算
                if (mouse.x !== null && mouse.y !== null) {
                    const dx = this.x - mouse.x;
                    const dy = this.y - mouse.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < mouse.radius) {
                        // 距離越近，推力越強 (力場衰減模型)
                        const force = (mouse.radius - distance) / mouse.radius;
                        const angle = Math.atan2(dy, dx);
                        
                        // 施加排斥力，使其迅速往外側推開
                        const pushX = Math.cos(angle) * force * 5;
                        const pushY = Math.sin(angle) * force * 5;

                        this.x += pushX;
                        this.y += pushY;
                    }
                }

                // 邊界條件判定
                if (this.y > canvas.height + 20 || this.x < -20 || this.x > canvas.width + 20) {
                    this.reset();
                }
            }

            draw() {
                ctx.save();
                
                if (currentPreset === 'snow') {
                    // 繪製雪花 (圓點)
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                } else if (currentPreset === 'rain') {
                    // 繪製傾斜的雨絲
                    ctx.beginPath();
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = this.size;
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(this.x + this.speedX * 1.5, this.y + this.length);
                    ctx.stroke();
                } else { // leaves
                    // 繪製落葉 (旋轉的橢圓狀或小葉片)
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.rotation * Math.PI / 180);
                    ctx.beginPath();
                    // 用貝茲曲線簡單勾勒葉片形狀
                    ctx.moveTo(0, -this.size);
                    ctx.quadraticCurveTo(this.size * 0.6, 0, 0, this.size);
                    ctx.quadraticCurveTo(-this.size * 0.6, 0, 0, -this.size);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                }

                ctx.restore();
            }
        }

        // 初始化粒子陣列
        function init() {
            particles.length = 0;
            for (let i = 0; i < maxParticles; i++) {
                particles.push(new Particle());
            }
        }

        // 變更預設天氣效果
        window.changePreset = function(preset) {
            currentPreset = preset;
            
            // 切換按鈕 active 樣式
            document.querySelectorAll('.btn-group button').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById(`btn-${preset}`).classList.add('active');
            
            init(); // 重新生成適合新天氣的粒子
        };

        // 起動初始化
        init();

        // 渲染迴圈
        function animate() {
            // 微妙地保留上一幀，產生自然的動態拖尾模糊 (Motion Blur)
            ctx.fillStyle = 'rgba(11, 15, 25, 0.25)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 如果滑鼠在畫面上，繪製一個微弱的磁場感應圈 (非必要，但有助於視覺化)
            if (mouse.x !== null && mouse.y !== null) {
                ctx.beginPath();
                ctx.arc(mouse.x, mouse.y, mouse.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.02)';
                ctx.fill();
            }

            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
