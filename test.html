<!DOCTYPE html>
<html>
<head>
<style>
/* 遊戲主選單按鈕 */
.menu-btn {
  padding: 10px 20px;
  font-size: 16px;
  background-color: #2c3e50;
  color: white;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.2s;
}
.menu-btn:hover { background-color: #34495e; }

/* Modal 背景遮罩 */
.modal-overlay {
  display: none; /* 預設隱藏 */
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(4px); /* 磨砂玻璃效果 */
  z-index: 1000;
  justify-content: center;
  align-items: center;
}

/* Modal 主視窗 */
.modal-content {
  background-color: #1a1a1a;
  color: #e0e0e0;
  border: 2px solid #444;
  border-radius: 8px;
  width: 90%;
  max-width: 500px;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
  overflow: hidden;
  font-family: sans-serif;
  animation: fadeIn 0.2s ease-out;
}

@keyframes fadeIn {
  from { transform: scale(0.9); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

/* 標頭 */
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
  background-color: #2d2d2d;
  border-bottom: 1px solid #444;
}
.modal-header h2 { margin: 0; font-size: 1.2rem; color: #fff; }
.close-btn {
  background: none;
  border: none;
  color: #aaa;
  font-size: 28px;
  cursor: pointer;
  line-height: 1;
}
.close-btn:hover { color: #fff; }

/* 內容區 */
.modal-body {
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

/* 存檔欄位 Slot */
.save-slot {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background-color: #252525;
  border: 1px solid #3d3d3d;
  border-radius: 6px;
  padding: 12px 15px;
  transition: border-color 0.2s;
}
.save-slot:hover { border-color: #555; }

/* 存檔資訊 */
.slot-info { display: flex; align-items: center; gap: 15px; }
.slot-number {
  font-size: 0.8rem;
  font-weight: bold;
  background-color: #444;
  color: #fff;
  padding: 4px 8px;
  border-radius: 4px;
}
.slot-details p { margin: 0 0 4px 0; font-size: 0.95rem; font-weight: 500; }
.slot-date { font-size: 0.75rem; color: #888; }

/* 操作按鈕群 */
.slot-actions { display: flex; gap: 8px; }
.slot-actions button {
  padding: 6px 12px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-weight: bold;
  font-size: 0.85rem;
  transition: opacity 0.2s;
}
.slot-actions button:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

/* 各別按鈕顏色定義 */
.btn-save { background-color: #27ae60; color: white; }
.btn-save:hover:not(:disabled) { background-color: #2ecc71; }

.btn-load { background-color: #2980b9; color: white; }
.btn-load:hover:not(:disabled) { background-color: #3498db; }

.btn-delete {
  background-color: #c0392b;
  color: white;
  padding: 6px 8px !important; /* 讓刪除的叉叉按鈕窄一點 */
}
.btn-delete:hover:not(:disabled) { background-color: #e74c3c; }
</style>
</head>
<body>
<h1>My First JavaScript</h1>

<!-- 觸發按鈕（可以放在你的遊戲選單中） -->
<button onclick="openSaveModal()" class="menu-btn">系統選單（存/讀檔）</button>

<!-- 存讀檔 Modal 視窗 -->
<div id="saveModal" class="modal-overlay" onclick="closeSaveModalOutside(event)">
  <div class="modal-content">
    <div class="modal-header">
      <h2>系統存檔 / 讀檔</h2>
      <button onclick="closeSaveModal()" class="close-btn">&times;</button>
    </div>
    
    <div class="modal-body">
      <!-- 存檔欄位 1 -->
      <div class="save-slot" id="slot-1">
        <div class="slot-info">
          <span class="slot-number">SLOT 01</span>
          <div class="slot-details">
            <p class="slot-status">尚無存檔資料</p>
            <span class="slot-date">--/--/-- --:--</span>
          </div>
        </div>
        <div class="slot-actions">
          <button class="btn-save" onclick="handleSave(1)">寫入</button>
          <button class="btn-load" onclick="handleLoad(1)" disabled>讀取</button>
          <button class="btn-delete" onclick="handleDelete(1)" disabled>&times;</button>
        </div>
      </div>

      <!-- 存檔欄位 2 -->
      <div class="save-slot" id="slot-2">
        <div class="slot-info">
          <span class="slot-number">SLOT 02</span>
          <div class="slot-details">
            <p class="slot-status">尚無存檔資料</p>
            <span class="slot-date">--/--/-- --:--</span>
          </div>
        </div>
        <div class="slot-actions">
          <button class="btn-save" onclick="handleSave(2)">寫入</button>
          <button class="btn-load" onclick="handleLoad(2)" disabled>讀取</button>
          <button class="btn-delete" onclick="handleDelete(2)" disabled>&times;</button>
        </div>
      </div>

      <!-- 存檔欄位 3 -->
      <div class="save-slot" id="slot-3">
        <div class="slot-info">
          <span class="slot-number">SLOT 03</span>
          <div class="slot-details">
            <p class="slot-status">尚無存檔資料</p>
            <span class="slot-date">--/--/-- --:--</span>
          </div>
        </div>
        <div class="slot-actions">
          <button class="btn-save" onclick="handleSave(3)">寫入</button>
          <button class="btn-load" onclick="handleLoad(3)" disabled>讀取</button>
          <button class="btn-delete" onclick="handleDelete(3)" disabled>&times;</button>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
// 你的預設遊戲狀態（從上一步繼承）
const defaultGameState = {
    location: "graveyard",
    inventory: [],
    hp: 100,
    sanity: 100,
    atk: 0,
    def: 0,
    coin: 0,
    fame: 0,
    flags: {
        metWorld: false,
        unlockGuardHouse: false,
        metBug: false,
        metAlys: false,
        hasAlys: false,
        metShade: false,
        hasKeyItem: false,
        bargainedWithShade: false,
        angeredShade: false,
        sacrificedBlood: false
    },
    ended: false,
    inspecting: null
};

// 模擬當前遊戲中的活動狀態（實際運行中這會是你的全域變數）
let currentGameState = { ...defaultGameState };

// --- Modal 顯示/隱藏控制 ---
function openSaveModal() {
    updateSlotsUI(); // 開啟時先刷新介面
    document.getElementById("saveModal").style.display = "flex";
}

function closeSaveModal() {
    document.getElementById("saveModal").style.display = "none";
}

// 點擊視窗外部可以關閉
function closeSaveModalOutside(event) {
    if (event.target.id === "saveModal") {
        closeSaveModal();
    }
}

// --- 存/讀檔核心邏輯 ---

// 1. 儲存檔案
function handleSave(slotId) {
    // 儲存前先將 inspecting 清空（避免卡在檢視畫面）
    const stateToSave = { ...currentGameState, inspecting: null, lastSaved: Date.now() };
    
    try {
        localStorage.setItem(`game_save_slot_${slotId}`, JSON.stringify(stateToSave));
        alert(`Slot ${slotId} 存檔成功！`);
        updateSlotsUI(); // 重新整理 UI
    } catch (e) {
        alert("存檔失敗，空間不足！");
    }
}

// 2. 讀取檔案
function handleLoad(slotId) {
    const rawData = localStorage.getItem(`game_save_slot_${slotId}`);
    if (!rawData) return;

    try {
        const loadedData = JSON.parse(rawData);
        // 合併預設值以防遊戲版本更新缺欄位
        currentGameState = { ...defaultGameState, ...loadedData };
        
        alert(`Slot ${slotId} 讀檔成功！`);
        closeSaveModal();
        
        // 這裡可以觸發你的遊戲重繪 UI 函式，例如：renderGameScene();
        console.log("當前遊戲狀態已更新：", currentGameState);
    } catch (e) {
        alert("存檔檔案損毀，無法載入！");
    }
}

// 3. 刪除檔案
function handleDelete(slotId) {
    if (confirm(`確定要刪除 Slot ${slotId} 的存檔嗎？此動作無法復原。`)) {
        localStorage.removeItem(`game_save_slot_${slotId}`);
        updateSlotsUI();
    }
}

// --- 動態更新 UI 畫面 ---
function updateSlotsUI() {
    for (let i = 1; i <= 3; i++) {
        const rawData = localStorage.getItem(`game_save_slot_${i}`);
        const slotEl = document.getElementById(`slot-${i}`);
        
        const statusEl = slotEl.querySelector(".slot-status");
        const dateEl = slotEl.querySelector(".slot-date");
        const loadBtn = slotEl.querySelector(".btn-load");
        const deleteBtn = slotEl.querySelector(".btn-delete");

        if (rawData) {
            try {
                const saveData = JSON.parse(rawData);
                // 格式化顯示玩家當前的狀態資訊
                statusEl.textContent = `地點：${translateLocation(saveData.location)} (HP: ${saveData.hp} / SAN: ${saveData.sanity})`;
                
                // 格式化時間
                const date = new Date(saveData.lastSaved);
                dateEl.textContent = date.toLocaleString();
                
                // 啟用讀取和刪除按鈕
                loadBtn.disabled = false;
                deleteBtn.disabled = false;
            } catch (e) {
                statusEl.textContent = "⚠️ 存檔損毀";
                dateEl.textContent = "--/--/-- --:--";
                loadBtn.disabled = true;
                deleteBtn.disabled = false; // 依然允許刪除損毀的檔案
            }
        } else {
            // 沒有存檔時的預設狀態
            statusEl.textContent = "尚無存檔資料";
            dateEl.textContent = "--/--/-- --:--";
            loadBtn.disabled = true;
            deleteBtn.disabled = true;
        }
    }
}

// 輔助函式：將程式碼地名轉換成中文顯示
function translateLocation(loc) {
    const maps = {
        "graveyard": "荒涼墓園",
        "guardhouse": "守衛室",
        "forest": "迷霧森林"
    };
    return maps[loc] || loc;
}
</script>
</body>
</html>
