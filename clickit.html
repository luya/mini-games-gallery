<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>連續點擊小遊戲</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>
  body {
    font-family: sans-serif;
    background: #222;
    color: #fff;
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    user-select: none;
  }

  .top-bar {
    margin-top: 20px;
    font-size: 1.3rem;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .click-area {
    margin-top: 30px;
    width: 80vw;
    height: 80vw;
    max-width: 350px;
    max-height: 350px;
    background: #444;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    cursor: pointer;
    transition: background 0.1s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
    
  }

  .click-area:active {
    background: #666;
    transform: scale(0.97);
  }

  .bottom-bar {
    margin-top: 30px;
  }

  button {
    padding: 14px 28px;
    font-size: 1.2rem;
    border: none;
    border-radius: 8px;
    background: #ff9800;
    color: #222;
    cursor: pointer;
  }

  button:disabled {
    background: #777;
    cursor: not-allowed;
  }

  .result {
    margin-top: 20px;
    font-size: 1.4rem;
    color: #ffeb3b;
  }

  #backBtn {
    position: fixed;
    top: 12px;
    left: 12px;
    z-index: 9999;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: #8f7a66;
    color: #fff;
    text-decoration: none;
    font-size: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;

    /* 動畫 */
    transition: transform 0.2s ease, background 0.2s ease;
    box-shadow: 0 4px 8px rgba(0,0,0,0.25);
  }

  #backBtn:hover {
    transform: scale(1.15);
    background: #a68b74;
  }
</style>
</head>
<body>
<a id="backBtn" href="index.html">🏠</a>
<div class="top-bar">
  <div>倒數時間：<span id="time">10</span> 秒</div>
  <div>連點次數：<span id="count">0</span></div>
  <div>每秒點擊數（CPS）：<span id="cps">0</span></div>
</div>

<div class="click-area" id="clickArea">點我！</div>

<div class="bottom-bar">
  <button id="startBtn">開始 / 繼續</button>
</div>

<div class="result" id="result"></div>

<script>
  const timeEl = document.getElementById("time");
  const countEl = document.getElementById("count");
  const cpsEl = document.getElementById("cps");
  const clickArea = document.getElementById("clickArea");
  const startBtn = document.getElementById("startBtn");
  const resultEl = document.getElementById("result");

  let totalTime = 10;
  let remainingTime = totalTime;
  let count = 0;
  let timer = null;
  let isRunning = false;

  document.addEventListener("touchstart", () => {}, true);


  function updateUI() {
    timeEl.textContent = remainingTime;
    countEl.textContent = count;
    cpsEl.textContent = (count / (totalTime - remainingTime)).toFixed(1);
  }

  function getComment(cps) {
    if (cps >= 10) return "⚡ 手速爆炸！你是閃電俠";
    if (cps >= 6) return "🔥 手速很快！不錯喔";
    if (cps >= 3) return "🙂 手速普通，再加油";
    return "🐌 手速偏慢，多練練吧";
  }

  function startGame() {
    if (isRunning) return;

    if (remainingTime <= 0) {
      remainingTime = totalTime;
      count = 0;
      resultEl.textContent = "";
    }

    isRunning = true;
    startBtn.disabled = true;
    clickArea.textContent = "狂點！";

    timer = setInterval(() => {
      remainingTime--;
      updateUI();

      if (remainingTime <= 0) {
        clearInterval(timer);
        isRunning = false;
        startBtn.disabled = false;
        clickArea.textContent = "時間到！";

        const cpsFinal = (count / totalTime).toFixed(1);
        resultEl.textContent = `你的 CPS：${cpsFinal}　→　${getComment(cpsFinal)}`;
      }
    }, 1000);
  }

  function handleClickArea() {
    if (!isRunning) return;
    count++;
    updateUI();
  }

  startBtn.addEventListener("click", startGame);
  // 手機用 touchstart，電腦用 click
  if ("ontouchstart" in window) {
    clickArea.addEventListener("touchstart", (e) => {
      e.preventDefault(); // 防止觸發 click
      handleClickArea();
    });
  } else {
    clickArea.addEventListener("click", handleClickArea);
  }


  updateUI();
</script>

</body>
</html>
