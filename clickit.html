<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>連續點擊小遊戲</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      margin: 0;
      background: #222;
      color: #fff;
    }

    .top-bar {
      margin-top: 20px;
      display: flex;
      gap: 40px;
      font-size: 1.2rem;
    }

    .click-area {
      margin-top: 40px;
      width: 300px;
      height: 300px;
      background: #444;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      cursor: pointer;
      user-select: none;
      transition: background 0.1s, transform 0.1s;
    }

    .click-area:active {
      background: #666;
      transform: scale(0.98);
    }

    .bottom-bar {
      margin-top: 40px;
    }

    button {
      padding: 10px 20px;
      font-size: 1rem;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      background: #ff9800;
      color: #222;
    }

    button:disabled {
      background: #777;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <div>倒數時間：<span id="time">10</span> 秒</div>
    <div>連點次數：<span id="count">0</span></div>
  </div>

  <div class="click-area" id="clickArea">
    點我！
  </div>

  <div class="bottom-bar">
    <button id="startBtn">開始 / 繼續</button>
  </div>

  <script>
    const timeEl = document.getElementById('time');
    const countEl = document.getElementById('count');
    const clickArea = document.getElementById('clickArea');
    const startBtn = document.getElementById('startBtn');

    let totalTime = 10;      // 總秒數
    let remainingTime = totalTime;
    let count = 0;
    let timer = null;
    let isRunning = false;

    function updateUI() {
      timeEl.textContent = remainingTime;
      countEl.textContent = count;
    }

    function startGame() {
      if (isRunning) return;
      if (remainingTime <= 0) {
        // 如果時間已經用完，重新開始
        remainingTime = totalTime;
        count = 0;
      }

      isRunning = true;
      startBtn.disabled = true;

      timer = setInterval(() => {
        remainingTime--;
        updateUI();

        if (remainingTime <= 0) {
          clearInterval(timer);
          isRunning = false;
          startBtn.disabled = false;
          clickArea.textContent = '時間到！';
        }
      }, 1000);

      clickArea.textContent = '狂點！';
    }

    function handleClickArea() {
      if (!isRunning) return;
      count++;
      updateUI();
    }

    startBtn.addEventListener('click', startGame);
    clickArea.addEventListener('click', handleClickArea);

    // 初始 UI
    updateUI();
  </script>
</body>
</html>
