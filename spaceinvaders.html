<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Emoji 小蜜蜂外星人侵略戰 🛸 (鍵盤純享版)</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html {
            font-size: 20px;
        }

        canvas,
        div {
            /* 1. 防止長按 Emoji 或按鈕時，跳出手機系統的「複製、選取」選單 */
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;

            /* 2. 點擊按鈕時，有些手機會出現一個醜醜的「藍色半透明點擊高亮框」，這行可以把它關掉 */
            -webkit-tap-highlight-color: transparent;

            /* 3. 告訴瀏覽器這塊區域不要觸發手機預設的手勢（如滑動重整、上一頁下一頁） */
            /* touch-action: none; */
        }

        body {
            font-family: "Noto Sans TC", "Helvetica Neue", Helvetica, Arial, "PingFang TC", "Heiti TC", "Apple LiGothic Medium", "Microsoft JhengHei", sans-serif;
            width: auto;
            height: auto;
            margin: 0;
            padding: 0;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
        }

        /* 遊戲主容器 */
        #game-container {
            position: relative;
            width: 100vw;
            height: 100svh;
            max-width: 480px;
            /* 電腦版稍微拓寬一點，玩起來更舒服 */
            max-height: 960px;
            background: #000;
            border: 4px solid #333;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* 計分板 */
        #score-board {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px #000;
            z-index: 10;
        }

        #backBtn {
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 9999;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #8f7a66;
            color: #fff;
            text-decoration: none;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;

            /* 動畫 */
            transition: transform 0.2s ease, background 0.2s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.25);
        }

        #backBtn:hover {
            transform: scale(1.15);
            background: #a68b74;
        }
    </style>
    <link rel="stylesheet" href="nesjoystick.css">
</head>

<body>
    <a id="backBtn" href="index.html">🏠</a>

    <div id="game-container">
        <div id="score-board">得分: <span id="score">0</span></div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="debug-panel">
        <h2>NES 搖桿測試數據(適用觸控裝置)</h2>
        <div class="data-grid">
            <div id="debug-info">搖桿狀態: <span id="val-joy-status" style="color: #ff5555;">放開</span></div>
            <div id="debug-info">搖桿向量: <span id="val-joy-vector">X: 0.00, Y: 0.00</span></div>
            <div id="debug-info">搖桿方向: <span id="val-joy-dir" style="color: #55ff55;">NONE</span></div>
            <div id="debug-info">A 鍵狀態: <span id="val-btn-a">0</span></div>
            <div id="debug-info">B 鍵狀態: <span id="val-btn-b">0</span></div>
            <div id="debug-info">SELECT: <span id="val-btn-select">0</span></div>
            <div id="debug-info">START: <span id="val-btn-start">0</span></div>
        </div>
    </div>

    <div id="touch-container">

        <div id="joystick-zone"></div>

        <div id="joystick-base">
            <div id="joystick-stick"></div>
        </div>

        <div id="buttons-zone">
            <div class="action-btn" id="btn-b">B</div>
            <div class="action-btn" id="btn-a">A</div>
        </div>

        <div id="system-buttons">
            <div class="sys-btn" id="btn-select"></div>
            <div class="sys-btn" id="btn-start"></div>
        </div>

    </div>

    <script src="ayakit.js"></script>
    <script src="nesjoystick.js"></script>
    <script>
        // ==========================================
        // 1. 初始化畫布
        // ==========================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');

        function resizeCanvas() {
            const rect = canvas.parentNode.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 遊戲狀態
        let score = 0;
        let isGameOver = false;

        // ==========================================
        // 2. 遊戲物件設定 (使用 Emoji)
        // ==========================================
        const player = {
            x: canvas.width / 2,
            y: canvas.height - 100,
            size: 40,
            speed: 4,
            emoji: '🚀',
            shootCooldown: false // 射擊冷卻狀態
        };

        const bullets = []; // 子彈陣列 ⚡
        const enemies = []; // 外星人陣列 🛸
        const enemyEmojis = ['🛸', '👾', '👻', '👽'];

        // ==========================================
        // 3. 鍵盤輸入監聽邏輯
        // ==========================================
        const keys = {};

        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;

            // 如果遊戲結束時按下 Enter 或 空白鍵，就重新開始
            if (isGameOver && e.key === 'Enter') {
                resetGame();
            }
        });

        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        function handleInput() {

            if (gamepadState && isGameOver) {
                if (gamepadState.start) {
                    resetGame();
                }
            }
            if (isGameOver) return;
            if (gamepadState && !isGameOver) {
                if (gamepadState.joystick.active) {
                    console.log(gamepadState.joystick.dir)
                    player.x += player.speed * gamepadState.joystick.x;
                    player.y += player.speed * gamepadState.joystick.y;
                }
            }
            // 左右移動 (支援 WASD 與 方向鍵)
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) player.x -= player.speed;
            if (keys['ArrowRight'] || keys['d'] || keys['D']) player.x += player.speed;

            // 上下移動
            if (keys['ArrowUp'] || keys['w'] || keys['W']) player.y -= player.speed;
            if (keys['ArrowDown'] || keys['s'] || keys['S']) player.y += player.speed;

            // 玩家畫布邊界限制
            if (player.x < player.size / 2) player.x = player.size / 2;
            if (player.x > canvas.width - player.size / 2) player.x = canvas.width - player.size / 2;
            if (player.y < player.size / 2) player.y = player.size / 2;
            if (player.y > canvas.height - player.size / 2) player.y = canvas.height - player.size / 2;

            // 發射子彈 (空白鍵)
            if ((keys[' '] || gamepadState.buttonA) && !player.shootCooldown) {
                bullets.push({
                    x: player.x,
                    y: player.y - 20,
                    size: 20,
                    speed: 8,
                    emoji: '⚡'
                });

                // 啟動射擊冷卻（每 0.2 秒最多發射一顆，防止子彈連成一條線）
                player.shootCooldown = true;
                setTimeout(() => player.shootCooldown = false, 100);
            }
        }

        // ==========================================
        // 4. 遊戲數據更新 (Update)
        // ==========================================
        let enemySpawnTimer = 0;

        function update() {

            // 1. 處理玩家位移與輸入
            handleInput();
            if (isGameOver) return;

            // 2. 更新子彈位置 (往上飛)
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y -= bullets[i].speed;
                if (bullets[i].y < -20) {
                    bullets.splice(i, 1); // 飛出螢幕就刪除
                }
            }

            // 3. 定時生成外星人
            // --- 核心改動在這裡 ---
            // 1. 計算當前過了大關卡幾次（每 100 分算一階）
            // 例如：80分時是 0+1 階，120分時是 1+1 階，250分時是 2+1 階
            const speedLevel = Math.floor(score / 100) + 1;

            enemySpawnTimer++;
            if (enemySpawnTimer > 35) { // 數字越小生成越快
                const randomEmoji = enemyEmojis[Math.floor(Math.random() * enemyEmojis.length)];
                enemies.push({
                    x: Math.random() * (canvas.width - 40) + 20,
                    y: -30,
                    size: 35,
                    speed: Math.random() * (speedLevel / 10), // 隨機速度 0.1+
                    emoji: randomEmoji
                });
                enemySpawnTimer = 0;
            }

            // 4. 更新外星人位置 (往下飛)
            for (let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].y += enemies[i].speed;

                // 觸底判定 或 撞到玩家 
                if (enemies[i].y > canvas.height + 30 || checkCollision(player, enemies[i])) {
                    isGameOver = true;
                }
            }

            // 5. 子彈與外星人的碰撞偵測
            for (let b = bullets.length - 1; b >= 0; b--) {
                for (let e = enemies.length - 1; e >= 0; e--) {
                    if (checkCollision(bullets[b], enemies[e])) {
                        bullets.splice(b, 1);
                        enemies.splice(e, 1);
                        score += 10;
                        scoreEl.innerText = score;
                        break; // 這顆子彈已經消失，直接跳出內層迴圈
                    }
                }
            }
        }

        // 圓形/距離碰撞演算法
        function checkCollision(obj1, obj2) {
            if (!obj1 || !obj2) return false;
            const dist = Math.hypot(obj1.x - obj2.x, obj1.y - obj2.y);
            return dist < (obj1.size / 2 + obj2.size / 2);
        }

        // ==========================================
        // 5. 畫面繪製 (Draw)
        // ==========================================
        function draw() {
            // 清空並重畫星空背景
            ctx.fillStyle = '#000015';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 畫子彈 ⚡
            ctx.font = '20px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            bullets.forEach(b => {
                ctx.fillText(b.emoji, b.x, b.y);
            });

            // 畫外星人 🛸
            enemies.forEach(e => {
                ctx.font = `${e.size}px sans-serif`;
                ctx.fillText(e.emoji, e.x, e.y);
            });

            // 畫玩家飛機 🚀
            if (!isGameOver) {
                ctx.font = `${player.size}px sans-serif`;
                ctx.fillText(player.emoji, player.x, player.y);
            } else {
                // 畫遊戲結束黑幕
                ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#ff4444';
                ctx.font = 'bold 36px sans-serif';
                ctx.fillText('💥 GAME OVER 💥', canvas.width / 2, canvas.height / 2 - 30);

                ctx.fillStyle = '#fff';
                ctx.font = '20px sans-serif';
                ctx.fillText('按下 [ Enter ] 重新開始', canvas.width / 2, canvas.height / 2 + 30);
            }
        }

        // 重置遊戲數據
        function resetGame() {
            score = 0;
            scoreEl.innerText = score;
            bullets.length = 0;
            enemies.length = 0;
            player.x = canvas.width / 2;
            player.y = canvas.height - 100;
            isGameOver = false;
        }

        // ==========================================
        // 6. 核心遊戲迴圈
        // ==========================================
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // 啟動！
        gameLoop();

    </script>
</body>

</html>
