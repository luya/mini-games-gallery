<body>
    <a id="backBtn" href="index.html">🏠</a>
    <div class="game">
        <div class="header">
            <div class="header-top">
                <div class="title">深淵國度：墮落者</div>
            </div>
            <div class="inventory-container">
                <div class="inventory" id="inventory"></div>
            </div>
        </div>

        <div class="dialog">
            <div class="location-name" id="locationName"></div>
            <div class="dialog-text" id="dialogText"></div>
            <div class="skull" id="sceneIcon">💀</div>

        <div class="options" id="options"></div>

        <div class="footer">
            <span id="statusText" style="white-space: pre-wrap;">開始選擇你的命運⋯</span>
        </div>
        <div class="footer_start">
            <span style="white-space: pre-wrap;">HP ❤️: <span id="HP">???/???</span></span>

        </div>
        <div class="footer_end">
            <button class="restart-btn" id="restartBtn">重新開始旅程 🔁</button>
        </div>

    <script src="ayakit.js"></script>

            graveyard_east: "艾莉絲：『該不會衝出殭屍吧？媽阿，噁心的地方。』",

            inventory: [],
            hp: 100,
            sanity: 100,

            def: 0,
            coin: 0,
            fame: 0,
            doom: 0,

                unlockGraveyardWestGate: false,
                unlockGuardHouse: false,
                firstKnock: false,
                welcomeToCathedral: false,
                metAlys: false,
                battle: false,
                battleForAlys: false,
                // metShade: false,
                // hasKeyItem: false,
                // bargainedWithShade: false,

            },
            mob_state : {
                hp: 100,
                sanity: 100,
                atk: 0,
                def: 0,
                coin: 0,
                fame: 0,
                doom: 0,
            }
        };

        let state = structuredClone(state_default);//不能有function

        let autosavename = "Abyss_Nation_Fallen_Survivors_Auto.sav";

        state = AyaKits.loadGame(structuredClone(state_default), autosavename);

        //場景設定
        const locations = {
            // 無名墓園>中央區域
            graveyard_center: {
                name: "⚰️ 無名墓園 中央區域",
                text: () => {
                    let base = "霧色濃得像一塊巨大的紗布。";
                    base += "\n地上佈滿破碎的墓碑，四周有著多處的莫名的土堆以及凹洞。";
                    if (!state.flags.metWorld) {
                        base += "\n你在一個土坑中爬出來，指尖沾著冷硬的泥土。";
                        base += "\n遠處的鐘聲在黑暗中迴盪，每一聲都像在為你倒數。";
                        state.flags.metWorld = true;
                    }
                    return base;
                },
                options: () => {
                    let opts = [
                        { text: "往東前進 ⚰️", next: "graveyard_east" },
                        { text: "走向西邊 ⚰️", next: "graveyard_west" }
                    ];

                    // opts.unshift({
                    //     text: "環顧四週，到處調查 👁️‍🗨️",

                    //             "當望向遠方的時候，白霧幾乎擋住所有的視線 🌫️。",

                    //         ];
                    //         let sindex = Math.floor(Math.random() * stext.length)
                    //         if (state.inventory.includes(ITEMS.SHIELD)) {
                    //             if (sindex == 3) sindex = 0;
                    //         }
                    //         setStatus(stext[sindex]);
                    //         if (sindex == 3) addItem(ITEMS.SHIELD);
                    //     }
                    // });
                    // if (!state.inventory.includes(ITEMS.TORCH)) {
                    //     opts.unshift({
                    //         text: "翻找無名墓，看看有沒有遺物 🦴",
                    //         next: "graveyard",
                    //         action: () => { addItem(ITEMS.TORCH); setStatus("你找到一支幾乎熄滅的火把。它仍微微發熱。 🔥"); }
                    //     });
                    // }
                    return opts;
                }
            },
            // 無名墓園>西方區域
            graveyard_west: {
                name: "⚰️ 無名墓園 西方區域",
                text: () => {
                    let base = "這裡是墓園的深處，西方有個小出口通往森林地區。";
                    if (!state.flags.unlockGraveyardWestGate) {
                        base += "\n不過這個出口的金屬門被上鎖了。";
                    }
                    return base;
                },
                options: () => {
                    let opts = [
                        { text: "漫步到墓園中心點 ⚰️", next: "graveyard_center" }
                    ];

                    if (!state.flags.unlockGraveyardWestGate) {
                        opts.unshift({
                            text: "試著扯下大鎖 💪",//🔒
                            next: "graveyard_west",
                            action: () => {
                                state.hp -= 1;
                                setStatus("沒有任何效果，鎖與鍊條都很結實 💦");
                            }
                        });
                    }
                    return opts;
                }
            },
            // 無名墓園>東方區域
            graveyard_east: {
                name: "⚰️ 無名墓園 東方區域",
                text: () => {
                    let base = "這裡是墓園的東方區域，可以看到出口處旁邊有一間小屋。";
                    return base;
                },
                options: () => {
                    let opts = [
                        { text: "走向墓園小屋 🏚️", next: "guardhouse" },

                    return opts;
                }

                name: "🏚️ 墓園小屋",
                text: () => {
                    let baseText = "已經沒有任何居住痕跡的小屋。";
                    baseText += "\n屋內牆角有一群散發異味盲眼蟲在蠕動。";
                    if (!state.flags.unlockGuardHouse) {
                        baseText = "小屋的門異常的結實。"
                        baseText += "\n四周也看不到窗戶以及其他入口。"
                    }
                    return baseText;
                },
                options: () => {
                    const opts = [
                        { text: "朝東邊的教堂前進 ⛪", next: "cathedral_entry" },
                        { text: "向西前進 ⚰️", next: "graveyard_east" }
                    ];
                    if (!state.inventory.includes(ITEMS.TORCH)) {
                        opts.unshift({
                            text: "拿走在牆上的火把 🔥",
                            next: "guardhouse",
                            action: () => { addItem(ITEMS.TORCH); setStatus("你找到一支幾乎熄滅的火把。它仍微微發熱。 🔥"); }
                        });
                    }
                    if (!state.flags.unlockGuardHouse) {
                        if (!state.firstKnock) {
                            opts.unshift({
                                text: "試著撞開門 💥",//💪
                                next: "guardhouse",
                                action: () => {
                                    state.hp -= 2;
                                    setStatus("沒有任何效果，只有疼痛 🩸");
                                    state.firstKnock = true;
                                }
                            });
                        }
                        if (state.flags.hasAlys) {
                            opts.unshift({
                                text: "請艾莉絲開鎖 🗝️",
                                next: "guardhouse",
                                action: () => {
                                    state.flags.unlockGuardHouse = true;
                                    setStatus("艾莉絲：『沒問題，小意思。』沒多久時間，鎖已經成功打開了。");
                                }
                            });
                        }

                    }
                    if (state.flags.unlockGuardHouse) {
                        if (state.inventory.includes(ITEMS.TORCH) && !state.inventory.includes(ITEMS.LANTERN)) {
                            opts.unshift({
                                text: "用火把驅趕飛蟲，搜查守衛遺物 🪔",
                                next: "guardhouse",
                                action: () => { addItem(ITEMS.LANTERN); setStatus("你成功驅散飛蟲，在暗格裡發現了「守墓人提燈」。"); }
                            });
                        }
                    }
                    return opts;
                }
            },
            // 教堂>入口區域
            cathedral_entry: {
                name: "⛪ 教堂 入口區域",
                text: () => {
                    let baseText = "一座散發出莊嚴氣息的大教堂。";
                    baseText += "\n外觀看起來實非古老，好像被戰火摧殘過。";
                    baseText += "\n北邊有一條向下的道路。";
                    baseText += "\n南方有條小徑。";
                    return baseText;
                },
                options: () => {
                    const opts = [
                        { text: "朝北方的道路前進 ⤴️", next: "cathedral_ramp" },
                        { text: "走向小徑 ⤵️", next: "cathedral_well" },
                        //💧
                        { text: "探索墓園小屋 🏚️", next: "guardhouse" }
                    ];

                    if (!state.flags.welcomeToCathedral) {
                        opts.unshift({
                            text: "敲門 ✊",
                            next: "cathedral_entry",
                            action: () => {
                                setStatus("沒有人應門，你目前也不敢隨意闖進去。");
                            }
                        });
                    }
                    return opts;
                }
            },
            // 教堂>取水區域
            cathedral_well: {
                name: "💧 教堂 取水區域",
                text: () => {
                    let base = "這裡有一口水井。";//🤏👄🧊
                    base += "\n看起來還可以使用。";
                    return base;
                },
                options: () => {
                    let opts = [
                        {
                            text: "使用水井 🤏", next: "cathedral_well",
                            action: () => {
                                setStatus("水質好像還可以？");
                                state.hp += 1;
                                state.sanity += 2;
                            }
                        },
                        {
                            text: "對著水井講話 👄", next: "cathedral_well",
                            action: () => { setStatus("好像有回聲產生？"); }
                        },
                        { text: "回到教堂入口區域 ⛪", next: "cathedral_entry" },
                    ];
                    return opts;
                }
            },
            // 教堂坡道
            cathedral_ramp: {
                name: "↗️ 教堂坡道",
                text: () => {
                    let base = "這是可以通往教堂的坡道。教堂就位在坡道上方，北方的小路可以通往村莊。";
                    return base;
                },
                options: () => {
                    let opts = [
                        { text: "向北方邁進 🍀", next: "village_path_3" },
                        { text: "拜訪教堂 ⛪", next: "cathedral_entry" },
                    ];
                    return opts;
                }
            },
            // 村莊小路 3
            village_path_3: {
                name: "🍀 一般道路",
                text: () => {
                    let base = "一個普通的道路。";
                    return base;
                },
                options: () => {
                    let opts = [
                        { text: "往北邊行走 🏘️", next: "village_path_2" },
                        { text: "向南方前進 ⛪", next: "cathedral_ramp" },
                    ];
                    return opts;
                }
            },
            // 村莊小路 2
            village_path_2: {
                name: "☘️ 一般道路",
                text: () => {
                    let base = "一個普通的道路。";
                    if (!state.flags.metAlys) {
                        base = "一個穿著黑袍的刺客向你靠近，你也注意到黑暗處有人在注視著你們。";
                    }
                    if (state.flags.metAlys && !state.inventory.includes(ITEMS.ALYS)){
                        base = "黑暗處的黑影並沒有離開。";
                    }

                    return base;
                },
                options: () => {
                    let opts = [
                        { text: "往北邊行走 🏘️", next: "village_path_1" },

                                    state.location_save = state.location;

                            { text: "💬 與黑影對話", next: state.location },

                }

                name: "⚔️ 作戰中",

                    if (!state.flags.battle) {
                        state.mob_state.hp = 25;
                        state.mob_state.sanity = 25;
                        state.mob_state.atk = 1;
                        state.mob_state.def = 0;

                        state.mob_state.fame = 3;
                        state.mob_state.doom = -1;

                            state.mob_state.def = 0;

                                setStatus("💪 攻擊");

                title: "結局二：封印者 (常規結局)",
                text: "你將野獸顱骨獻祭給祭壇，強行切斷了世界與外部裂隙的連結。\n天空的裂痕癒合了，世界重獲光明。\n但你明白，裂隙並未消失，它被永久鎖在你的內心。每當黑夜降臨，你便會聽見體內傳來瘋狂的低語。"
            },
            godslayer: {
                title: "結局三：弒神之刃 (戰鬥結局)",
                text: "你揮舞著沉重的審判者大劍，帶著無上決意斬斷了王座上的神祕黑影！\n黑夜在不甘的慘叫聲中褪去。然而，失去了古老神明的壓制，混亂的法則開始失控。\n為了維持世界運轉，你被迫坐上了那冰冷的倒錯王座，成為新的、孤獨的監管者。"
            },
            salvation: {
                title: "結局四：盲女的救贖 (同伴結局)",
                text: "你選擇了燃燒自己的存在，將裂隙指環的所有力量注入艾莉絲的體內。\n黑暗的詛咒從她身上剝離，她的雙眼重見光明。她流著淚逃離了這片破碎之地，活了下去。\n而你，自願代替她下沉，成為沉入深淵底部的石塊，永遠沉睡。"
            },
            loop: {
                title: "結局五：時間無限循環 (隱藏真結局)",
                text: "在世界毀滅的終點，你激活了倒流沙漏，並詠唱殘頁上的禁忌神術。\n整片星空開始瘋狂倒轉，時間的洪流將你猛烈扯回⋯⋯\n\n當你再度睜開眼時，四周是熟悉的冷硬泥土。你回到了起點的無名墓前。\n耳邊隱約響起地下的低語：「你不是第一次來這裡了⋯⋯」"
            },
            void: {
                title: "結局六：歸於虛無 (壞結局一)",
                text: "你沒能揭開這片土地的謎題。你暴露在虛無的侵蝕下太久導致瘋狂，你的身體與靈魂被漸漸化為純粹的黑暗粒子。\n世界上徹底抹消了你存在過的痕跡。沒有人記得你來過，連黑影也嫌棄地吹散了你的灰燼。"
            },
            dead: {
                title: "結局七：肉體損壞 (壞結局二)",
                text: "你沒能揭開這片土地的謎題。你過度使用身體導致受傷過於嚴重，你的身體與靈魂被漸漸化為純粹的黑暗粒子。\n世界上徹底抹消了你存在過的痕跡。沒有人記得你來過，連黑影也嫌棄地吹散了你的灰燼。"
            },
            doom: {
                title: "結局八：末日降臨 (壞結局三)",
                text: "你沒能揭開這片土地的謎題。你虛度太多時光導致毒霧遽增覆蓋了整個地區，所有人的身體與靈魂被漸漸化為純粹的黑暗粒子。\n世界上徹底抹消了你存在過的痕跡。沒有人記得你來過，連黑影也嫌棄地吹散了你的灰燼。"
            }
        };

        // UI 渲染與核心邏輯
        const locationNameEl = document.getElementById("locationName");
        const dialogTextEl = document.getElementById("dialogText");
        const optionsEl = document.getElementById("options");
        const inventoryEl = document.getElementById("inventory");
        const statusTextEl = document.getElementById("statusText");
        const restartBtn = document.getElementById("restartBtn");
        const sceneIconEl = document.getElementById("sceneIcon");
        const HPEl = document.getElementById("HP");
        const SAEl = document.getElementById("SANITY");
        const COEl = document.getElementById("COIN");
        const FAEl = document.getElementById("FAME");
        const DOEl = document.getElementById("DOOM");

        function setStatus(text) {
            statusTextEl.textContent = text;
        }

        function addItem(itemKey) {
            if (!state.inventory.includes(itemKey)) {
                state.inventory.push(itemKey);
            }
            renderInventory();
        }

        function removeItem(itemKey) {
            if (state.inventory.includes(itemKey)) {
                // console.log(itemKey)
                state.inventory.pop(itemKey);
            }
            renderInventory();
        }

        // 渲染上方可點擊的道具與夥伴列表
        function renderInventory() {
            inventoryEl.innerHTML = "道具：";
            // 如果有夥伴
            if (state.inventory.includes(ITEMS.ALYS)) {
                inventoryEl.innerHTML = "隊員以及道具：";
            }

            // 生成獲得的道具按鈕
            state.inventory.forEach((itemKey) => {
                const btn = document.createElement("button");

                btn.className = "inv-btn";
                if (itemKey == "ALYS") {
                    btn.className = "inv-btn partner";
                }

                btn.textContent = ITEM_DATA[itemKey].name;
                btn.addEventListener("click", () => inspectSomething(itemKey));
                inventoryEl.appendChild(btn);
            });

            if (inventoryEl.children.length === 0) {
                inventoryEl.textContent = "道具：無";
            }
        }

        // 進入調查/對話模式
        function inspectSomething(target) {
            if (state.ended) return;
            state.inspecting = target;
            render();
        }

        function endGame(type) {
            state.ended = true;
            const ending = endings[type];
            locationNameEl.textContent = ending.title;
            dialogTextEl.textContent = ending.text;
            sceneIconEl.textContent = "⚖️";

            optionsEl.innerHTML = "";
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerHTML = `<span>在雨夜的事務所中再度睜眼，重啟調查 🔁</span><span class="option-key">重開</span>`;
            btn.addEventListener("click", restartGame);
            optionsEl.appendChild(btn);

            setStatus("案件調查已宣告落幕。");
        }

        // 核心渲染邏輯：區分「現場探索」與「互動面板」
        function render() {
            renderInventory();
            optionsEl.innerHTML = "";

            if (state.ended) return;

            // 情況 A：正在進行道具調查或夥伴交談
            if (state.inspecting !== null) {

                // 道具調查
                const item = ITEM_DATA[state.inspecting];
                locationNameEl.textContent = `🔍 調查中：${item.name}`;
                sceneIconEl.textContent = "🧩";
                dialogTextEl.textContent = item.desc;
                if (state.inspecting === "ALYS") {
                    locationNameEl.textContent = `💬 與隊員互動中：${item.name}`;
                    sceneIconEl.textContent = "🌹";
                    dialogTextEl.textContent = PARTNER_DIALOGUE[state.location] || item.desc;
                }

                // console.log(item.hp);
                if ((item.hp && state.hp < 100) || (item.sanity && state.sanity < 100)) {
                    const useBtn = document.createElement("button");
                    useBtn.className = "option-btn";
                    useBtn.innerHTML = `<span>使用道具 🤏</span><span class="option-key">選項</span>`;
                    if (state.inspecting === "ALYS") {
                        useBtn.innerHTML = `<span>簡易醫療處理 🤍</span><span class="option-key">技能</span>`;
                    }
                    useBtn.addEventListener("click", () => {
                        setStatus(item.result);
                        if (item.doom) state.doom += item.doom;
                        if (item.hp) state.hp += item.hp;
                        if (state.hp > 100) state.hp = 100;
                        if (item.sanity) state.sanity += item.sanity
                        if (state.sanity > 100) state.sanity = 100;
                        if (!item.repeat) removeItem(state.inspecting);
                        state.inspecting = null;
                        render();
                    });
                    optionsEl.appendChild(useBtn);
                }


                // 生成返回現場的按鈕
                const returnBtn = document.createElement("button");
                returnBtn.className = "option-btn";
                returnBtn.innerHTML = `<span>繼續冒險 ↩️</span><span class="option-key">返回</span>`;
                returnBtn.addEventListener("click", () => {
                    state.inspecting = null;
                    render();
                });
                optionsEl.appendChild(returnBtn);
                return;
            }

            // 情況 B：正常場景探索
            const loc = locations[state.location];
            locationNameEl.textContent = loc.name;
            dialogTextEl.textContent = loc.text();
            sceneIconEl.textContent = "💀";

            if (state.hp <= 12) dialogTextEl.textContent += "\n(😓你覺得身體不適。)";
            if (state.sanity <= 12) dialogTextEl.textContent += "\n(🤪你覺得非常恐慌。)";

            const optionDefs = loc.options();
            optionDefs.forEach((opt, index) => {
                const btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerHTML = `<span>${opt.text}</span><span class="option-key">選項 ${index + 1}</span>`;

                // 遊戲核心
                btn.addEventListener("click", () => {
                    if (opt.action) {
                        opt.action();
                        state.sanity -= 1;
                    }
                    if (opt.next) {
                        state.location = opt.next;
                        if (loc.random_battle_dice){
                            let random_battle_dice = Math.random();
                            console.log(random_battle_dice);
                            if (random_battle_dice>=1-loc.random_battle_dice && state.location!="random_battle"){
                                state.location_save = state.location;
                                state.location = "random_battle";
                            }
                        }                        
                    }
                    if (state.hp <= 0) endGame("dead");
                    if (state.sanity <= 0) endGame("void");
                    if (state.doom >= 100) endGame("doom");

                    render();
                });
                optionsEl.appendChild(btn);
            });
            HPEl.textContent = `${state.hp}/100`;
            SAEl.textContent = `${state.sanity}/100`;
            COEl.textContent = `${state.coin}`;
            FAEl.textContent = `${state.fame}`;
            DOEl.textContent = `${state.doom}%`;
            AyaKits.saveGame(state, autosavename);
        }

        function restartGame() {
            state = structuredClone(state_default);
            setStatus("開始選擇你的命運⋯");
            render();
        }

        restartBtn.addEventListener("click", restartGame);

        // 啟動遊戲
        render();
    </script>
</body>

</html>
