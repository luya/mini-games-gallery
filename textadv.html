<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌓</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <title>Kingdom of Abyss</title>
    <link rel="stylesheet" href="ayakit.css">
    <link rel="stylesheet" href="textadv.css">
    <style>
        div {
            /* 1. 防止長按 Emoji 或按鈕時，跳出手機系統的「複製、選取」選單 */
            user-select: text;
            /* -webkit-user-select: none; */
            /* -webkit-touch-callout: none; */

            /* 2. 點擊按鈕時，有些手機會出現一個醜醜的「藍色半透明點擊高亮框」，這行可以把它關掉 */
            /* -webkit-tap-highlight-color: transparent; */

            /* 3. 告訴瀏覽器這塊區域不要觸發手機預設的手勢（如滑動重整、上一頁下一頁） */
            /* touch-action: none; */
        }
    </style>
</head>

<body>
    <a id="backBtn" href="index.html">🏠</a>
    <div class="game">
        <div class="header">
            <div class="header-top">
                <div class="title">邪神領域</div>
            </div>
            <div class="inventory-container">
                <div class="inventory" id="inventory"></div>
            </div>
        </div>

        <div class="dialog">
            <div class="location-name" id="locationName"></div>
            <div class="dialog-text" id="dialogText"></div>
            <div class="skull" id="sceneIcon">🍀</div>
        </div>

        <div class="options" id="options"></div>

        <div class="footer">
            <span id="statusText" style="white-space: pre-wrap;">開始選擇你的命運⋯</span>
        </div>
        <div class="footer_status">
            <div class="status_panel">
                <div class="status_start">
                    <span style="white-space: pre-wrap;">❤️ HP: </span>
                    <span style="white-space: pre-wrap;">🧠 Sanity: </span>
                    <span style="white-space: pre-wrap;">💰 Coin: </span>
                    <span style="white-space: pre-wrap;">🎭 Fame: </span>
                    <span style="white-space: pre-wrap;">🧿 Doom: </span>
                </div>
                <div class="status_end">
                    <span id="HP">?</span>
                    <span id="SANITY">?</span>
                    <span id="COIN">?</span>
                    <span id="FAME">?</span>
                    <span id="DOOM">?</span>
                </div>
            </div>
            <div class="status_panel">
                <div class="status_start">
                    <span style="white-space: pre-wrap;">⚡ Power: </span>
                    <span style="white-space: pre-wrap;">📚 Knowledge: </span>
                    <span style="white-space: pre-wrap;">✨ Charm: </span>
                    <span style="white-space: pre-wrap;">🔓 Lock Picking: </span>
                    <span style="white-space: pre-wrap;">⚒️ Creativity: </span>
                </div>
                <div class="status_end">
                    <span id="POWER">?</span>
                    <span id="KNOWLEDGE">?</span>
                    <span id="CHARM">?</span>
                    <span id="LOCK PICKING">?</span>
                    <span id="CREATIVITY">?</span>
                </div>
            </div>
            <div class="status_panel">
                <div class="status_start">
                    <span style="white-space: pre-wrap;">⚔️ Attack: </span>
                    <span style="white-space: pre-wrap;">🛡️ Defense: </span>
                    <span style="white-space: pre-wrap;">🔗 Logic: </span>
                    <span style="white-space: pre-wrap;">⛓️ Deduction: </span>
                    <span style="white-space: pre-wrap;">⭐ Concentration: </span>
                </div>
                <div class="status_end">
                    <span id="ATTACK">?</span>
                    <span id="DEFENSE">?</span>
                    <span id="LOGIC">?</span>
                    <span id="DEDUCTION">?</span>
                    <span id="CONCENTRATION">?</span>
                </div>
            </div>
        </div>

        <div class="footer_end">
            <button class="restart-btn" id="restartBtn">重新開始旅程 🔁</button>
        </div>
    </div>

    <script src="ayakit.js"></script>
    <script src="textadv_const.js"></script>
    <script src="textadv_loc.js"></script>
    <script>
        let state = structuredClone(state_default);//不能有function
        let autosavename = "Kingdom_of_Abyss_Auto.sav";
        state = AyaKits.loadGame(structuredClone(state_default), autosavename);
    </script>    
    <script src="textadv_core.js"></script>
</body>

</html>
