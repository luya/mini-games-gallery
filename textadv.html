<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⛓️</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <title>黑暗深淵：遺忘之都</title>
    <link rel="stylesheet" href="textadv.css">
    <link rel="stylesheet" href="ayakit.css">
</head>

<body>
    <a id="backBtn" href="index.html">🏠</a>
    <div class="game">
        <div class="header">
            <div class="header-top">
                <div class="title">黑暗深淵：遺忘之都</div>
            </div>
            <div class="inventory-container">
                <div class="inventory" id="inventory"></div>
            </div>
        </div>

        <div class="dialog">
            <div class="location-name" id="locationName"></div>
            <div class="dialog-text" id="dialogText"></div>
            <div class="skull" id="sceneIcon">💀</div>
        </div>

        <div class="options" id="options"></div>

        <div class="footer">
            <span id="statusText">開始選擇你的命運⋯</span>
        </div>
        <div class="footer_end">
            <button class="restart-btn" id="restartBtn">重新開始旅程 🔁</button>
        </div>
    </div>

    <script>
        // 10 個道具的完整鍵值與說明資料
        const ITEM_DATA = {
            TORCH: { name: "破舊火把 🔥", desc: "原本快熄滅的火把，不知為什在碰觸後，又開始點燃，可能還有些用途。", hp: 5, sanity: 5, result: "火把的能量忽然短暫增強，你感到安心不少。", repeat: true },
            SHIELD: { name: "青銅盾牌 🛡️", desc: "充滿使用痕跡的盾牌，冒險中帶著似乎也不是什壞事。", def: 3 },
            MEAT: { name: "新鮮生肉 🥩", desc: "還滴著紅血，生吃應該也是可以。", hp: 25, sanity: 25 },
            BBQ: { name: "烤排骨肉 🍖", desc: "帶骨的火炙強身大餐。", hp: 50, sanity: 50 },
            DAGGER: { name: "鏽蝕匕首 🗡️", desc: "復古的雕飾，經過歲月的摧殘，還算堪用的武器，雖然可能只能劃開皮膚而已。", atk: 1 },
            GUARDKEY: { name: "無名鑰匙 🗝️", desc: "鑰匙上方有著類似老鷹個符號。" },
            LANTERN: { name: "守墓人提燈 🪔", desc: "裏面尚有些許燃料，也許有著意外的功用。" },
            SKULL: { name: "野獸顱骨 ☠️", desc: "怪異的遺駭，感覺是一種祭品，原本可能是個巨大的野獸。" },
            BADGE: { name: "荊棘徽章 💠", desc: "古老的印記，或許跟遠古精靈有關係。" },
            POISON: { name: "鍊金術士的劇毒 🍾", desc: "試探了一下，一小滴就可以把植物融化，最好不要打破容器。" },
            PAGES: { name: "告解者殘頁 📜", desc: "奇特的頁面，上面的敘事有如詛咒，仔細閱讀就會暈眩。" },
            RING: { name: "裂隙指環 💍", desc: "【關鍵道具】未知且強大的物品，帶上的時候，內心會出現巨大的空洞感。" },
            SWORD: { name: "審判者大劍 🗡️", desc: "【關鍵道具】有著精美的製作與附魔，大部分都還閃閃發亮，握在手上也十分輕盈。", atk: 10 },
            HOURGLASS: { name: "倒流沙漏 ⏳", desc: "【關鍵道具】散發神秘的氣息，不知道有什功用。" }
        };

        const ITEMS = {
            TORCH: "TORCH",
            SHIELD: "SHIELD",
            DAGGER: "DAGGER",
            LANTERN: "LANTERN",
            SKULL: "SKULL",
            BADGE: "BADGE",
            POISON: "POISON",
            PAGES: "PAGES",
            RING: "RING",
            SWORD: "SWORD",
            HOURGLASS: "HOURGLASS"
        };

        // 夥伴隨「不同場景」變更的動態對話庫
        const PARTNER_DIALOGUE = {
            graveyard: "艾莉絲環顧四周：『‧‧‧，噁心的地方。。』",
            village: "艾莉絲：『這裡是一切的原點。』",
            guardhouse: "艾莉絲：『該不會衝出殭屍吧？媽阿，噁心的地方。』",
            alley: "陰暗的後巷中，蘿絲警惕地看著四周：『小心，這條巷子以前常有黑幫處理不聽話的叛徒。』",
            parking: "在地下停車場，蘿絲指著防彈車：『這輛車的後車廂有密倉，他平時習慣把最值錢或最危險的文件藏在那。』",
            slum: "回到她差點被圍堵的紅燈區，蘿絲冷笑：『這地方就是這座城市的膿包，每個人都活得像地老鼠一樣。』",
            club: "歌舞廳門前，蘿絲拉低了風衣領口，低聲說：『門口那兩個蠢貨我認識，等一下看我手勢，我過去引開他們。』",
            vip: "在VIP賭廳裡，蘿絲眼神複雜：『以前我總陪坐在這裡，看著那些高官一邊數著不義之財一邊談笑風生。真讓人作嘔。』",
            square: "看著大螢幕上的市長競選演講，蘿絲吐了一口唾沫：『聽聽那些滿口仁義道德的謊言。我們得撕爛他的面具。』",
            archives: "檔案館的陰影裡，蘿絲拍了拍保險櫃：『這裡面鎖著黑幫教父當年的家底，要是能撬開，保證有驚喜。』",
            dock: "碼頭狂風大作，蘿絲大聲喊道：『13號倉庫是他們走私的大本營！看守很嚴，得想個辦法混過去！』",
            subway: "漆黑的地鐵隧道中，蘿絲緊緊抓著你的手臂：『聽，有腳步聲⋯別點燈，跟緊我，我知道這裡的暗號。』",
            lab: "在暗紅色的沖印室，蘿絲看著洗出來的照片：『沒錯⋯就是這些照片。這就是他們犯罪的鐵證！』",
            police: "警局檔案室內，蘿絲低聲警告：『快一點，巡邏的警員每隔十分鐘會經過這裡。被抓到我們就完了。』",
            cityhall: "站在市政廳門前，蘿絲深吸了一口氣：『這棟樓裡裝滿了魔鬼。偵探，你準備好跟他們攤牌了嗎？』",
            confrontation: "市長辦公室頂樓，蘿絲看著夜景，眼神無比冰冷：『這就是從最頂端看下來的風景啊⋯真是骯髒。』",
            helipad: "直升機螺旋槳的狂風吹亂了她的長髮，蘿絲掏出藏在懷裡的小刀：『他們想跑？沒那麼容易！』",
            vault: "金庫錢堆前，蘿絲咬牙切齒：『這麼多血汗錢⋯偵探，別答應他的條件，用你的槍給他應有的審判！』",
            roseSecret: "（你們正在深入交談她的過去⋯）",
            broadcasting: "廣播塔頂，雷電交加。蘿絲幫你擋在門口：『按下去，偵探！把真相播出去！後面的追兵交給我！』"
        };

        // 遊戲狀態
        const state = {
            location: "graveyard",
            inventory: [],
            hp: 100,
            sanity: 100,
            atk: 0,
            def: 0,
            coin: 0,
            fame: 0,
            flags: {
                metWorld: false,
                unlockGuardHouse: false,
                metBug: false,
                metAlys: false,        // 夥伴：盜賊艾莉絲
                hasAlys: false,        // 夥伴：盜賊艾莉絲
                metShade: false,
                hasKeyItem: false,
                bargainedWithShade: false,
                angeredShade: false,
                sacrificedBlood: false
            },
            ended: false,
            inspecting: null // 當前正在檢視的道具 Key 或 'Alys'，為 null 表示在正常場景
        };

        // 20 個場景設定
        const locations = {
            // 1. 起點
            graveyard: {
                name: "⚰️ 無名墓園",
                text: () => {
                    let base = "夜色濃得像墨，破碎的墓碑在霧中歪斜。";
                    if (!state.flags.metWorld) {
                        base += "\n你在一座無名墓前醒來，指尖沾著冷硬的泥土。\n遠處的鐘聲在黑暗中迴盪——每一聲都像在為你倒數。";
                        state.flags.metWorld = true;
                    }
                    if (!state.inventory.includes(ITEMS.SHIELD) && state.sanity >= 80) {
                        base += "\n你感覺到附近可能會有些有用的東西。";
                    }
                    return base;
                },
                options: () => {
                    let opts = [
                        { text: "前往墓園守衛室 🏚️", next: "guardhouse" },
                        { text: "沿著小徑前往枯萎森林 🌲", next: "forest" }
                    ];
                    opts.unshift({
                        text: "環顧四週，到處調查 👁️‍🗨️",
                        next: "graveyard",
                        action: () => {
                            const stext = [
                                "你身處在一個墓園，大門出口旁邊有個守衛室 🏚️，更遠處有個小徑，通往一片森林 🌲。",
                                "看來這個墓園，應該都是埋葬無名屍，每個坑都已經被弄到凌亂不堪 🕳️。",
                                "當望向遠方的時候，白霧幾乎擋住所有的視線 🌫️。",
                                "你在搜索的時候，踢到一個盾牌 🛡️。"
                            ];
                            let sindex = Math.floor(Math.random() * stext.length)
                            if (state.inventory.includes(ITEMS.SHIELD)) {
                                if (sindex == 3) sindex = 0;
                            }
                            setStatus(stext[sindex]);
                            if (sindex == 3) addItem(ITEMS.SHIELD);
                        }
                    });
                    if (!state.inventory.includes(ITEMS.TORCH)) {
                        opts.unshift({
                            text: "翻找無名墓，看看有沒有遺物 🦴",
                            next: "graveyard",
                            action: () => { addItem(ITEMS.TORCH); setStatus("你找到一支幾乎熄滅的火把。它仍微微發熱。 🔥"); }
                        });
                    }
                    return opts;
                }
            },
            // 2. 守衛室
            guardhouse: {
                name: "🏚️ 墓園守衛室",
                text: () => {
                    let baseText = "已經沒有任何居住痕跡的小屋。\n屋內牆角有一群散發異味盲眼蟲在蠕動。"
                    if (!state.flags.unlockGuardHouse) baseText = "守衛室的小門異常的結實。\n四周也看不到窗戶以及其他入口。"
                    return baseText;
                },
                options: () => {
                    const opts = [
                        { text: "往無名墓園 ⚰️", next: "graveyard" },
                        { text: "朝出口處的破敗教堂前進 ⛪", next: "cathedral" }
                    ];
                    if (!state.flags.unlockGuardHouse) {
                        opts.unshift({
                            text: "環顧四週，到處調查👁️‍🗨️",
                            next: "guardhouse",
                            action: () => {
                                const stext = [
                                    "你試著撞開門，但是沒有效果。 💪",
                                    "守衛室的外牆也十分堅固。🧱",
                                    "地面下也沒有任何密道🕳️。",
                                    "你在搜索的時候，踢到一隻散發異味盲眼蟲。 🐛"
                                ];
                                let sindex = Math.floor(Math.random() * stext.length)
                                if (sindex == 3) {
                                    if (!state.flags.metBug) {
                                        state.sanity -= 5;
                                        state.flags.metBug = true;
                                    }
                                    else sindex = 0;
                                }
                                setStatus(stext[sindex]);

                            }
                        });
                        if (state.flags.hasAlys) {
                            opts.unshift({
                                text: "請艾莉絲開鎖 🗝️",
                                next: "guardhouse",
                                action: () => {
                                    state.flags.unlockGuardHouse = true;
                                    setStatus("艾莉絲：『沒問題，小意思。』沒多久時間，鎖已經成功打開了。");
                                }
                            });
                        }

                    }
                    if (state.flags.unlockGuardHouse) {
                        if (state.inventory.includes(ITEMS.TORCH) && !state.inventory.includes(ITEMS.LANTERN)) {
                            opts.unshift({
                                text: "用火把驅趕飛蟲，搜查守衛遺物 🪔",
                                next: "guardhouse",
                                action: () => { addItem(ITEMS.LANTERN); setStatus("你成功驅散飛蟲，在暗格裡發現了「守墓人提燈」。"); }
                            });
                        }
                    }
                    return opts;
                }
            },
            // 3. 大教堂
            cathedral: {
                name: "⛪ 破敗教堂",
                text: () => "教堂的彩繪玻璃早已碎裂。祭壇後方有一道被封死的石門，上面刻著：\n「唯有...者，得以穿越...。」\n上面的字跡過於古老，難以閱讀。",
                options: () => {
                    const opts = [
                        { text: "前往墓園守衛室 🏚️", next: "guardhouse" },
                        { text: "走向教堂旁的哀嚎廢村 🏘️", next: "village" }
                    ];
                    if (!state.inventory.includes(ITEMS.DAGGER)) {
                        opts.unshift({
                            text: "在教堂祭壇下搜尋可用的武器 🔍",
                            next: "cathedral",
                            action: () => { addItem(ITEMS.DAGGER); setStatus("你在祈禱台下翻出了一把「鏽蝕匕首」。"); }
                        });
                    }
                    if (state.inventory.includes(ITEMS.RING)) {
                        opts.unshift({ text: "將裂隙指環貼近石門，開啟通道 💍", next: "rift" });
                    }
                    return opts;
                }
            },
            // 4. 枯萎森林
            forest: {
                name: "🌲枯萎森林",
                text: () => "樹木像被吊死的巨人。霧氣在腳踝間盤旋。\n一個影子在樹間滑動，露出空洞的眼窩：「你還記得我嗎？」",
                options: () => {
                    const opts = [
                        { text: "朝向無名墓園⚰️", next: "graveyard" },
                        { text: "前往遺忘黑泉 💧", next: "spring" }
                    ];
                    if (!state.inventory.includes(ITEMS.SKULL)) {
                        opts.push({
                            text: "撿起地上的古怪野獸碎骨 ☠️",
                            next: "forest",
                            action: () => { addItem(ITEMS.SKULL); setStatus("你撿起一具慘白的「野獸顱骨」。"); }
                        });
                    }
                    return opts;
                }
            },
            // 5. 遺忘黑泉
            spring: {
                name: "5. 遺忘黑泉",
                text: () => "漆黑不見底的泉水，倒映不出你的面容。那團黑影凝聚在你身前，向你伸出雙手。",
                options: () => {
                    const opts = [
                        { text: "穿過泉水旁的小徑，前往哀嚎廢村 🏘️", next: "village" }
                    ];
                    if (!state.inventory.includes(ITEMS.RING) && !state.flags.bargainedWithShade) {
                        opts.push({
                            text: "以記憶為代價，與黑影交易 💍",
                            next: "spring",
                            action: () => {
                                addItem(ITEMS.RING);
                                state.flags.bargainedWithShade = true;
                                state.flags.hasKeyItem = true;
                                setStatus("你失去了一部分記憶，換得關鍵道具「裂隙指環」。");
                            }
                        });
                    }
                    return opts;
                }
            },
            // 6. 哀嚎廢村 (夥伴加入)
            village: {
                name: "🏘️ 絕叫之村",
                text: () => {
                    let base = "這裡死寂一片，所見屋舍大部分都很破舊。";
                    if (!state.flags.metAlys) {
                        base += "\n你面前一個惡漢看起來來者不善，正向你逼近。\n並且在某個黑暗角落，一雙眼睛正盯著你。";
                    } else {
                        if (!state.flags.hasAlys) {
                            base += "\n在某個黑暗角落，一雙眼睛正盯著你。";
                        } else {
                            base += "\n盜賊艾莉絲靜靜地跟在你的身旁。";
                        }
                    }
                    return base;
                },
                options: () => {
                    let opts = [];
                    if (!state.flags.metAlys) {
                        opts = [
                            {
                                text: "使出純粹的力量 💪",
                                next: "village",
                                action: () => {
                                    state.flags.metAlys = true;
                                    state.hp -= 5;
                                    state.sanity -= 5;
                                    state.fame += 5;
                                    setStatus("惡漢看來只是餓壞了，單純想要搶劫而已，你兩三下就了結了戰鬥。\n但是你受了一些擦傷，惡漢也逃跑了。");
                                }
                            }
                        ];
                        if (state.inventory.includes(ITEMS.SHIELD)) {
                            opts.push({
                                text: "先防禦再說 🛡️",
                                next: "village",
                                action: () => {
                                    state.flags.metAlys = true;
                                    state.coin += 50;
                                    state.sanity -= 10;
                                    state.fame += 10;
                                    setStatus("惡漢出拳攻擊，可是換來的只有疼痛。\n你趁機用盾牌敲暈他。\n然後搜刮戰利品，他身上倒是有一些金幣？");
                                }
                            });
                            if (state.inventory.includes(ITEMS.DAGGER) || state.inventory.includes(ITEMS.SWORD)) {
                                opts.push({
                                    text: "反殺對方 🗡️",
                                    next: "village",
                                    action: () => {
                                        state.flags.metAlys = true;
                                        state.coin += 50;
                                        state.sanity -= 15;
                                        state.fame += 15;
                                        setStatus("惡漢出拳攻擊，你格擋之後，抹了對方的脖子。\n然後搜刮戰利品，他身上倒是有一些金幣？");
                                    }
                                });
                            }
                        }
                        if (state.inventory.includes(ITEMS.DAGGER) || state.inventory.includes(ITEMS.SWORD)) {
                            opts.push({
                                text: "拿出武器展現自己不好惹 🗡️",
                                next: "village",
                                action: () => {
                                    setStatus("惡漢忽然驚慌地逃跑了。");
                                    state.flags.metAlys = true;
                                }
                            });
                        }

                    } else {
                        opts = [
                            { text: "前往嘆息之橋 🌉", next: "bridge" },
                            { text: "折返回破敗教堂 ⛪", next: "cathedral" }
                        ];
                        if (!state.flags.hasAlys) {
                            opts.push({
                                text: "與監看者交談 💬",
                                next: "village",
                                action: () => {

                                    state.flags.hasAlys = true;
                                    setStatus("艾莉絲現出身影：『很有趣的身手，讓我跟著你吧，你無法拒絕我的。』「女盜賊」艾莉絲 👩🏻‍🦳 加入了你的隊伍！");
                                }
                            });
                        }
                    }



                    return opts;
                }
            },
            // 7. 嘆息之橋
            bridge: {
                name: "7. 嘆息之橋",
                text: () => "一座橫跨深淵的斷橋。迷霧中隱約傳來巨大妖獸的呼吸聲，強行通過極其危險。",
                options: () => {
                    const opts = [
                        { text: "退回哀嚎廢村 ↩️", next: "village" },
                        { text: "強行衝過斷橋（極度危險） 🏃", next: "swamp" }
                    ];
                    if (state.flags.hasAlys) {
                        opts.push({
                            text: "讓艾莉絲聽聲辨位，引導你潛伏過去 🤫",
                            next: "swamp",
                            action: () => { setStatus("藉由艾莉絲敏銳的聽覺，你們完美避開了妖獸的注意，安全過橋。"); }
                        });
                    }
                    return opts;
                }
            },
            // 8. 浸血沼澤
            swamp: {
                name: "8. 浸血沼澤",
                text: () => "地面全是散發血腥味的紅色泥濘。濃霧遮蔽了視線，方向難辨。",
                options: () => {
                    const opts = [
                        { text: "盲目摸索前進，走向遠處的迷宮 🌲", next: "labyrinth" }

                        opts.push({
                            text: "點燃守墓人提燈照亮沼澤隱藏道路 🪔",
                            next: "labyrinth",
                            action: () => { setStatus("提燈的光芒驅散了毒霧，你發現了一條通往荊棘迷宮的捷徑。"); }
                        });
                    }
                    return opts;
                }
            },
            // 9. 荊棘迷宮
            labyrinth: {
                name: "9. 荊棘迷宮",
                text: () => "無數尖銳且帶刺的漆黑藤蔓交織成龐大的迷宮，稍有不慎就會被刺穿肉體。",
                options: () => {
                    const opts = [
                        { text: "小心翼翼穿過迷宮，前往殉教者陵墓 🪦", next: "tomb" }
                    ];
                    if (!state.inventory.includes(ITEMS.BADGE)) {
                        opts.push({
                            text: "忍痛伸手摘取迷宮中心的黑色花朵 🛡️",
                            next: "labyrinth",
                            action: () => { addItem(ITEMS.BADGE); setStatus("你的手被刺得鮮血淋漓，但獲得了「荊棘徽章」。"); }
                        });
                    }
                    return opts;
                }
            },
            // 10. 殉教者陵墓
            tomb: {
                name: "10. 殉教者陵墓",
                text: () => "地下的古老陵墓。中央有一具石棺，其上插著一把散發凜冽寒光的巨劍，劍柄被荊棘鎖死。",
                options: () => {
                    const opts = [
                        { text: "離開陵墓，走向裂隙祭壇 ⛓️", next: "altar" }
                    ];
                    if (state.inventory.includes(ITEMS.DAGGER) && !state.inventory.includes(ITEMS.SWORD)) {
                        opts.push({
                            text: "用匕首斬斷荊棘，強行拔出巨劍 🗡️",
                            next: "tomb",
                            action: () => { addItem(ITEMS.SWORD); setStatus("匕首應聲斷裂，但你成功拔出了關鍵道具「審判者大劍」！"); }
                        });
                    }
                    return opts;
                }
            },
            // 11. 裂隙祭壇
            altar: {
                name: "11. 裂隙祭壇",
                text: () => "由碎骨與黑石砌成的祭壇。中央的凹槽彷彿在渴求著某些供物。上方天空裂開一道微光。",
                options: () => {
                    const opts = [
                        { text: "繞過祭壇，前往怨靈礦坑 ⛏️", next: "mine" }
                    ];
                    if (state.inventory.includes(ITEMS.SKULL)) {
                        opts.push({
                            text: "將野獸顱骨作為供品獻祭 🚫",
                            next: "altar",
                            action: () => { endGame("seal"); } // 觸發結局：封印者
                        });
                    }
                    return opts;
                }
            },
            // 12. 怨靈礦坑
            mine: {
                name: "12. 怨靈礦坑",
                text: () => "漆黑的廢棄礦道，四周傳來無數死難者的哀慟與怨靈哭聲。",
                options: () => {
                    const opts = [
                        { text: "頂著怨靈的干擾，深入地底鍊金坊 🧪", next: "workshop" }
                    ];
                    if (state.flags.hasAlys) {
                        opts.push({
                            text: "讓艾莉絲吟唱安魂曲，引導怨靈退散 🎵",
                            next: "workshop",
                            action: () => { setStatus("艾莉絲輕聲哼唱，怨靈們漸漸平息，讓開了一條安全的道路。"); }
                        });
                    }
                    return opts;
                }
            },
            // 13. 地底鍊金坊
            workshop: {
                name: "13. 地底鍊金坊",
                text: () => "佈滿灰塵與打破藥瓶的古代實驗室。桌上有一瓶泛著詭異紫光的劇毒液體。",
                options: () => {
                    const opts = [
                        { text: "前往瘋狂圖書室 📚", next: "library" }
                    ];
                    if (!state.inventory.includes(ITEMS.POISON)) {
                        opts.push({
                            text: "將這瓶未知的劇毒毒藥收起 🧪",
                            next: "workshop",
                            action: () => { addItem(ITEMS.POISON); setStatus("你獲得了「鍊金術士的劇毒」。這絕不是可以用來療傷的東西。"); }
                        });
                    }
                    return opts;
                }
            },
            // 14. 瘋狂圖書室
            library: {
                name: "14. 瘋狂圖書室",
                text: () => "無數禁忌書籍在此腐爛，翻開它們彷彿能聽見瘋狂的低語。",
                options: () => {
                    const opts = [
                        { text: "離開圖書室，走向虛無迴廊 🌌", next: "corridor" }
                    ];
                    if (!state.inventory.includes(ITEMS.PAGES)) {
                        opts.push({
                            text: "頂著精神污染，強行閱讀殘存的文獻 📜",
                            next: "library",
                            action: () => { addItem(ITEMS.PAGES); setStatus("你強忍頭痛，撕下了記載禁忌禁術的「告解者殘頁」。"); }
                        });
                    }
                    return opts;
                }
            },
            // 15. 虛無迴廊
            corridor: {
                name: "15. 虛無迴廊",
                text: () => "這裡的空間嚴重扭曲，重力倒錯，若無關鍵信物指引，將永遠迷失在迴廊深處。",
                options: () => {
                    const opts = [];
                    if (state.inventory.includes(ITEMS.RING)) {
                        opts.push({
                            text: "利用裂隙指環產生的共鳴穩定空間，前往裂隙之門 🚪",
                            next: "rift"
                        });
                    } else {
                        opts.push({
                            text: "在沒有指環的情況下盲目硬闖走廊 🚶",
                            next: "corridor",
                            action: () => { endGame("void"); } // 觸發結局：歸於虛無
                        });
                    }
                    return opts;
                }
            },
            // 16. 裂隙之門
            rift: {
                name: "16. 裂隙之門",
                text: () => "大教堂石門後方的真正面貌：一片懸浮的黑暗。碎片般的記憶在周圍漂浮。前方可通往更核心的區域。",
                options: () => {
                    const opts = [
                        { text: "踏入裂隙，讓自己徹底被黑暗吞沒 🌌", action: () => { endGame("door"); } }, // 觸發結局：裂隙之門
                        { text: "穿過裂隙邊緣，探索時間停滯之穹 ⏳", next: "dome" },
                        { text: "往更深處走去，挑戰倒錯王座 👑", next: "throne" }
                    ];
                    if (state.flags.hasAlys) {
                        opts.push({ text: "轉向盲女，試圖探尋她的內心裂隙 👁️", next: "alysRift" });
                    }
                    return opts;
                }
            },
            // 17. 時間停滯之穹
            dome: {
                name: "17. 時間停滯之穹",
                text: () => "沙塵懸浮在半空中，時間在這裡失去了意義。中央的高台上放著一個神祕的沙漏。",
                options: () => {
                    const opts = [
                        { text: "退回裂隙之門 ↩️", next: "rift" }
                    ];
                    if (state.inventory.includes(ITEMS.PAGES) && !state.inventory.includes(ITEMS.HOURGLASS)) {
                        opts.push({
                            text: "用殘頁上記載的咒語解開時空封印 ⏳",
                            next: "dome",
                            action: () => { addItem(ITEMS.HOURGLASS); setStatus("沙漏落在你手中，你獲得了逆轉因果的關鍵道具「倒流沙漏」。"); }
                        });
                    }
                    return opts;
                }
            },
            // 18. 倒錯王座
            throne: {
                name: "18. 倒錯王座",
                text: () => "巨大的王座顛倒懸掛在虛空中。黑影的本體坐在其上，俯瞰著你：「凡人，你想弒神，還是繼承這萬劫不復的黑夜？」",
                options: () => {
                    const opts = [
                        { text: "向命運低頭，飲下毒藥結束這一切 🧪", action: () => { endGame("void"); } }
                    ];
                    if (state.inventory.includes(ITEMS.SWORD)) {
                        opts.push({
                            text: "高舉審判者大劍，向古老黑影本體揮出弒神之擊！ 🗡️",
                            action: () => { endGame("godslayer"); } // 觸發結局：弒神之刃
                        });
                    }
                    if (state.inventory.includes(ITEMS.HOURGLASS)) {
                        opts.push({
                            text: "前往世界的最深處——世界之垠 🪐",
                            next: "worldEdge"
                        });
                    }
                    return opts;
                }
            },
            // 19. 盲女的內心裂隙
            alysRift: {
                name: "19. 盲女的內心裂隙",
                text: () => "藉由指環，你進入了艾莉絲的靈魂。你看見了她曾受過的苦難與黑暗。她是這個世界詛咒的活祭品。你可以選擇用指環的力量拯救她，但代價是巨大的。",
                options: () => {
                    const opts = [
                        { text: "退回裂隙之門 ↩️", next: "rift" },
                        {
                            text: "犧牲自己，用裂隙指環淨化艾莉絲的靈魂 💍",
                            action: () => { endGame("salvation"); } // 觸發結局：盲女的救贖
                        }
                    ];
                    return opts;
                }
            },
            // 20. 世界之垠
            worldEdge: {
                name: "20. 世界之垠",
                text: () => "時空在這裡崩解成純粹的虛無。不論怎麼選，世界都在步向終焉。此時你手中的沙漏瘋狂震動。",
                options: () => {
                    const opts = [];
                    if (state.inventory.includes(ITEMS.HOURGLASS) && state.inventory.includes(ITEMS.PAGES)) {
                        opts.push({
                            text: "激活倒流沙漏，將整個世界因果完全逆轉 ⏳",
                            action: () => { endGame("loop"); } // 觸發結局：時間無限循環
                        });
                    } else {
                        opts.push({
                            text: "眼睜睜看著虛無將你吞噬 🪐",
                            action: () => { endGame("void"); }
                        });
                    }
                    return opts;
                }
            }
        };

        // 6 種結局設定
        const endings = {
            door: {
                title: "結局一：裂隙之門 (常規結局)",
                text: "你接受了黑暗的召喚，踏入了無盡虛空。\n從此，你成為了新一代的裂隙之門，肉體消逝，靈魂永遠徘徊在虛實的邊緣。\n你將永世孤獨，直到下一個迷途者的到來⋯⋯"
            },
            seal: {
                title: "結局二：封印者 (常規結局)",
                text: "你將野獸顱骨獻祭給祭壇，強行切斷了世界與外部裂隙的連結。\n天空的裂痕癒合了，世界重獲光明。\n但你明白，裂隙並未消失，它被永久鎖在你的內心。每當黑夜降臨，你便會聽見體內傳來瘋狂的低語。"
            },
            godslayer: {
                title: "結局三：弒神之刃 (戰鬥結局)",
                text: "你揮舞著沉重的審判者大劍，帶著無上決意斬斷了王座上的神祕黑影！\n黑夜在不甘的慘叫聲中褪去。然而，失去了古老神明的壓制，混亂的法則開始失控。\n為了維持世界運轉，你被迫坐上了那冰冷的倒錯王座，成為新的、孤獨的監管者。"
            },
            salvation: {
                title: "結局四：盲女的救贖 (同伴結局)",
                text: "你選擇了燃燒自己的存在，將裂隙指環的所有力量注入艾莉絲的體內。\n黑暗的詛咒從她身上剝離，她的雙眼重見光明。她流著淚逃離了這片破碎之地，活了下去。\n而你，自願代替她下沉，成為沉入深淵底部的石塊，永遠沉睡。"
            },
            loop: {
                title: "結局五：時間無限循環 (隱藏真結局)",
                text: "在世界毀滅的終點，你激活了倒流沙漏，並詠唱殘頁上的禁忌神術。\n整片星空開始瘋狂倒轉，時間的洪流將你猛烈扯回⋯⋯\n\n當你再度睜開眼時，四周是熟悉的冷硬泥土。你回到了起點的無名墓前。\n耳邊隱約響起地下的低語：「你不是第一次來這裡了⋯⋯」"
            },
            void: {
                title: "結局六：歸於虛無 (壞結局一)",
                text: "你沒能揭開這片土地的謎題。你暴露在虛無的侵蝕下太久導致瘋狂，你的身體與靈魂被漸漸化為純粹的黑暗粒子。\n世界上徹底抹消了你存在過的痕跡。沒有人記得你來過，連黑影也嫌棄地吹散了你的灰燼。"
            },
            dead: {
                title: "結局七：肉體損壞 (壞結局二)",
                text: "你沒能揭開這片土地的謎題。你過度使用身體導致受傷過於嚴重，你的身體與靈魂被漸漸化為純粹的黑暗粒子。\n世界上徹底抹消了你存在過的痕跡。沒有人記得你來過，連黑影也嫌棄地吹散了你的灰燼。"
            }
        };

        // UI 渲染與核心邏輯
        const locationNameEl = document.getElementById("locationName");
        const dialogTextEl = document.getElementById("dialogText");
        const optionsEl = document.getElementById("options");
        const inventoryEl = document.getElementById("inventory");
        const statusTextEl = document.getElementById("statusText");
        const restartBtn = document.getElementById("restartBtn");
        const sceneIconEl = document.getElementById("sceneIcon");

        function setStatus(text) {
            statusTextEl.textContent = text;
        }

        function addItem(itemKey) {
            if (!state.inventory.includes(itemKey)) {
                state.inventory.push(itemKey);
            }
            renderInventory();
        }

        function removeItem(itemKey) {
            if (state.inventory.includes(itemKey)) {
                // console.log(itemKey)
                state.inventory.pop(itemKey);
            }
            renderInventory();
        }

        // 渲染上方可點擊的道具與夥伴列表
        function renderInventory() {
            inventoryEl.innerHTML = "道具：";

            // 如果有夥伴，生成對話按鈕
            if (state.flags.hasAlys) {
                inventoryEl.innerHTML = "隊員以及道具：";
                const btn = document.createElement("button");
                btn.className = "inv-btn partner";
                btn.textContent = "夥伴：艾莉絲 👩🏻‍🦳";
                btn.addEventListener("click", () => inspectSomething("Alys"));
                inventoryEl.appendChild(btn);
            }

            // 生成獲得的道具按鈕
            state.inventory.forEach((itemKey) => {
                const btn = document.createElement("button");
                btn.className = "inv-btn";
                btn.textContent = ITEM_DATA[itemKey].name;
                btn.addEventListener("click", () => inspectSomething(itemKey));
                inventoryEl.appendChild(btn);
            });

            if (inventoryEl.children.length === 0) {
                inventoryEl.textContent = "道具：無";
            }
        }

        // 進入調查/對話模式
        function inspectSomething(target) {
            if (state.ended) return;
            state.inspecting = target;
            render();
        }

        function endGame(type) {
            state.ended = true;
            const ending = endings[type];
            locationNameEl.textContent = ending.title;
            dialogTextEl.textContent = ending.text;
            sceneIconEl.textContent = "⚖️";

            optionsEl.innerHTML = "";
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerHTML = `<span>在雨夜的事務所中再度睜眼，重啟調查 🔁</span><span class="option-key">重開</span>`;
            btn.addEventListener("click", restartGame);
            optionsEl.appendChild(btn);

            setStatus("案件調查已宣告落幕。");
        }

        // 核心渲染邏輯：區分「現場探索」與「互動面板」
        function render() {
            renderInventory();
            optionsEl.innerHTML = "";

            if (state.ended) return;

            // 情況 A：正在進行道具調查或夥伴交談
            if (state.inspecting !== null) {
                if (state.inspecting === "Alys") {
                    // 夥伴對話
                    locationNameEl.textContent = "💬 與艾莉絲交談中";
                    sceneIconEl.textContent = "🌹";
                    // 根據當前所在位置獲取動態台詞
                    const currentLocKey = state.location;
                    const dialogue = PARTNER_DIALOGUE[currentLocKey] || "『我們得快點，時間不多了。』";
                    dialogTextEl.textContent = dialogue;
                } else {
                    // 道具調查
                    const item = ITEM_DATA[state.inspecting];
                    locationNameEl.textContent = `🔍 調查中：${item.name}`;
                    sceneIconEl.textContent = "🧩";
                    dialogTextEl.textContent = item.desc;
                    // console.log(item.hp);
                    if (item.hp) {
                        const useBtn = document.createElement("button");
                        useBtn.className = "option-btn";
                        useBtn.innerHTML = `<span>使用道具 🤏</span><span class="option-key">選項</span>`;
                        useBtn.addEventListener("click", () => {
                            setStatus(item.result);
                            if (item.hp) state.hp += item.hp;
                            if (state.hp > 100) state.hp = 100;
                            if (item.sanity) state.sanity += item.sanity
                            if (state.sanity > 100) state.sanity = 100;
                            if (!item.repeat) removeItem(state.inspecting);
                            state.inspecting = null;
                            render();
                        });
                        optionsEl.appendChild(useBtn);
                    }
                }

                // 生成返回現場的按鈕
                const returnBtn = document.createElement("button");
                returnBtn.className = "option-btn";
                returnBtn.innerHTML = `<span>繼續冒險 ↩️</span><span class="option-key">返回</span>`;
                returnBtn.addEventListener("click", () => {
                    state.inspecting = null;
                    render();
                });
                optionsEl.appendChild(returnBtn);
                return;
            }

            // 情況 B：正常場景探索
            const loc = locations[state.location];
            locationNameEl.textContent = loc.name;
            dialogTextEl.textContent = loc.text();
            sceneIconEl.textContent = "🔍";

            if (state.hp <= 12) dialogTextEl.textContent += "\n(😓你覺得身體不適。)";
            if (state.sanity <= 12) dialogTextEl.textContent += "\n(🤪你覺得非常恐慌。)";

            const optionDefs = loc.options();
            optionDefs.forEach((opt, index) => {
                const btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerHTML = `<span>${opt.text}</span><span class="option-key">選項 ${index + 1}</span>`;

                // 遊戲核心
                btn.addEventListener("click", () => {
                    if (opt.action) {
                        opt.action();
                        state.sanity -= 1;
                    }
                    if (opt.next) {
                        state.location = opt.next;
                    }
                    if (state.hp <= 0) endGame("dead");
                    if (state.sanity <= 0) endGame("void");

                    render();
                });
                optionsEl.appendChild(btn);
            });
        }

        function restartGame() {
            state.location = "graveyard";
            state.inventory = [];
            state.flags = {
                metWorld: false,
                unlockGuardHouse: false,
                metBug: false,
                hasAlys: false,        // 夥伴：盜賊艾莉絲
                metShade: false,
                hasKeyItem: false,
                bargainedWithShade: false,
                angeredShade: false,
                sacrificedBlood: false
            };
            state.ended = false;
            state.inspecting = null;
            setStatus("開始選擇你的命運⋯");
            render();
        }

        restartBtn.addEventListener("click", restartGame);

        // 啟動遊戲
        render();
    </script>
</body>

</html>
