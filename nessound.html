        :root {
            --bg-color: #1a1a24;
            --panel-color: #2d2d3d;
            --border-color: #44445c;
            --accent-color: #ff4554;
            --text-color: #e0e0e6;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        h1 {
            margin-bottom: 5px;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px #000;
        }

        .subtitle {
            font-size: 14px;
            color: #8888a0;
            margin-bottom: 25px;
        }

        /* 示波器 Canvas 樣式 */
        #waveform-scope {
            width: 100%;
            height: 100px;
            background-color: black;
            border: 4px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 20px;
        }

        /* 合成器主面板 */
        .synth-panel {
            background-color: var(--panel-color);
            border: 4px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            max-width: 1000px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .channel {
            background: #22222e;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .channel-title {
            font-weight: bold;
            text-align: center;
            color: var(--accent-color);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
            font-size: 14px;
            text-transform: uppercase;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            font-size: 12px;
        }

        .control-group label {
            display: flex;
            justify-content: space-between;
            color: #aaa;
        }

        input[type="range"],
        select {
            background: #333;
            border: 1px solid var(--border-color);
            color: white;
            padding: 4px;
            border-radius: 4px;
            width: 100%;
            box-sizing: border-box;
        }

        /* 虛擬鋼琴鍵盤容器：加上橫向捲軸以防小螢幕破版 */
        .keyboard {
            display: flex;
            margin-top: 30px;
            background: #111;
            padding: 10px;
            border-radius: 4px;
            box-shadow: inset 0 0 10px #000;
            position: relative;
            /* max-width: 1000px; */
            width: 100%;
            box-sizing: border-box;
            /* overflow-x: visible; */
            align-items: top;
            justify-content: center;
            /* 寬度不夠時允許橫向捲動 */
        }

        /* 白鍵：寬度縮小到 28px，讓 25 鍵更容易一目了然 */
        .key {
            height: 160px;
            width: 4%;
            background: white;
            border: 1px solid #ccc;
            border-radius: 0 0 4px 4px;
            cursor: pointer;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 5px;
            color: #333;
            font-size: 9px;
            font-weight: bold;
            box-sizing: border-box;
            z-index: 1;
            /* flex-shrink: 0; */
            margin-left: 1px;
            margin-right: 1px;
            /* 防止寬度被瀏覽器壓縮 */
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* 黑鍵：配合白鍵寬度等比例縮小 */
        .key.black {
            height: 80px;
            width: 36px;
            background: #222;
            border: 1px solid #000;
            margin-left: -17px;
            margin-right: -17px;
            z-index: 2;
            color: white;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }

        .key.active,
        .key.black.active {
            background: var(--accent-color);
            color: white;

    <h1>Nescaline with Realtime Scope</h1>

    <!-- 合成器控制面板 -->
    <div class="synth-panel">

        <!-- PULSE 1 -->
        <div class="channel" id="p1">
            <div class="channel-title">Pulse 1</div>
            <div class="control-group">
                <label>啟用通道 <input type="checkbox" id="p1-enable" checked></label>
            </div>
            <div class="control-group">
                <label>脈衝寬度 (Duty) <span id="p1-duty-val">50%</span></label>
                <select id="p1-duty">
                    <option value="0.125">12.5% (扁細)</option>
                    <option value="0.25">25% (標準)</option>
                    <option value="0.5" selected>50% (中空)</option>
                </select>
            </div>
            <div class="control-group">
                <label>音量衰減 (Decay) <span id="p1-decay-val">0.2s</span></label>
                <input type="range" id="p1-decay" min="0.05" max="1" step="0.05" value="0.2">
            </div>
        </div>

        <!-- (這裡省略 CH2-CH4 控制代碼，保持與上一題一致) -->
        <!-- PULSE 2 -->
        <div class="channel" id="p2">
            <div class="channel-title">Pulse 2 (方波2)</div>
            <div class="control-group">
                <label>啟用通道 <input type="checkbox" id="p2-enable"></label>
            </div>
            <div class="control-group">
                <label>脈衝寬度 (Duty) <span id="p2-duty-val">25%</span></label>
                <select id="p2-duty">
                    <option value="0.125">12.5%</option>
                    <option value="0.25" selected>25%</option>
                    <option value="0.5">50%</option>
                </select>
            </div>
            <div class="control-group">
                <label>音量衰減 (Decay) <span id="p2-decay-val">0.3s</span></label>
                <input type="range" id="p2-decay" min="0.05" max="1" step="0.05" value="0.3">
            </div>
        </div>

        <!-- TRIANGLE -->
        <div class="channel" id="tri">
            <div class="channel-title">Triangle (三角波)</div>
            <div class="control-group">
                <label>啟用通道 <input type="checkbox" id="tri-enable" checked></label>
            </div>
            <div class="control-group">
                <label style="visibility: hidden;">預留</label>
                <div style="height: 30px; color: #666; font-size: 11px; text-align: center;">固定輸出低音三角波</div>
            </div>
            <div class="control-group">
                <label>音量衰減 (Decay) <span id="tri-decay-val">0.4s</span></label>
                <input type="range" id="tri-decay" min="0.05" max="1" step="0.05" value="0.4">
            </div>
        </div>

        <!-- NOISE -->
        <div class="channel" id="noise">
            <div class="channel-title">Noise (雜音)</div>
            <div class="control-group">
                <label>啟用通道 <input type="checkbox" id="noise-enable"></label>
            </div>
            <div class="control-group">
                <label>頻率類型 <span id="noise-type-val">白噪音</span></label>
                <select id="noise-type">
                    <option value="white" selected>白噪音 (爆炸/小鼓)</option>
                    <option value="metallic">金屬感 (機槍/硬音)</option>
                </select>
            </div>
            <div class="control-group">
                <label>音量衰減 (Decay) <span id="noise-decay-val">0.15s</span></label>
                <input type="range" id="noise-decay" min="0.05" max="1" step="0.05" value="0.15">
            </div>
        </div>
    </div>

                keyBtn.dataset.freq = note.freq;

                keyboardDiv.appendChild(keyBtn);

                    analyser.fftSize = 2048;
                    bufferLength = analyser.frequencyBinCount;
                    dataArray = new Uint8Array(bufferLength);
                    drawWaveform();
                }

            function handlePointerEvents(e) {
                initAudio();

                const currentActiveKeys = new Set();

                // 處理多點觸控 (Touch)
                if (e.touches && e.touches.length > 0) {
                    for (let i = 0; i < e.touches.length; i++) {
                        const touch = e.touches[i];

                        // 💡 關鍵修正：完全不看 touch.target，直接拿當下的絕對座標 (clientX, clientY) 去戳網頁
                        const element = document.elementFromPoint(touch.clientX, touch.clientY);

                        if (element && element.classList.contains('key')) {
                            currentActiveKeys.add(element);
                        }
                    }
                } else {
                    // 處理滑鼠 (Mouse)
                    if (e.buttons === 1) {
                        const element = document.elementFromPoint(e.clientX, e.clientY);
                        if (element && element.classList.contains('key')) {
                            currentActiveKeys.add(element);
                        }
                    }
                }

                // [以下步驟 2 和 3 保持完全不變]
                // 2. 對比新舊狀態：新按下的發聲
                currentActiveKeys.forEach(keyBtn => {
                    if (!activeKeys.has(keyBtn)) {
                        keyBtn.classList.add('active');
                        const freq = parseFloat(keyBtn.dataset.freq);
                        playNESNote(freq);
                        activeKeys.add(keyBtn);
                    }
                });

                // 3. 對比新舊狀態：離開的消音
                activeKeys.forEach(keyBtn => {
                    if (!currentActiveKeys.has(keyBtn)) {
                        keyBtn.classList.remove('active');
                        // 如果有寫 stop 邏輯在此呼叫
                        activeKeys.delete(keyBtn);
                    }
                });

            // 3. 將事件全部綁在父容器（或 document）上，全盤掌控滑動與多點
            // 同時監聽滑鼠與觸控事件
            ['pointerdown', 'pointermove', 'pointerup', 'touchstart', 'touchmove', 'touchend'].forEach(eventType => {
                keyboardDiv.addEventListener(eventType, (e) => {
                    // 如果是觸控事件，阻止預設行為避免畫面亂滾
                    if (eventType.startsWith('touch')) {
                        e.preventDefault();
                    }
                    handlePointerEvents(e);
                }, { passive: false });
            });

            // --- D. 核心繪圖函式：即時示波器 ---
            function drawWaveform() {
                if (!analyser) return;

                // 不斷重複繪製下一幀
                requestAnimationFrame(drawWaveform);

                // 1. 抓取目前的時域音波資料
                analyser.getByteTimeDomainData(dataArray);

                // 2. 準備乾淨畫布
                canvasCtx.fillStyle = 'black'; // 設為黑色背景
                canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

                // 3. 設定畫筆樣式 (綠色示波器風格)
                canvasCtx.lineWidth = 2;
                canvasCtx.strokeStyle = '#00ff00';

                // 4. 開始畫路徑 (將陣列資料對應到 Y 軸)
                canvasCtx.beginPath();

                // 計算每一格在 Canvas 上的寬度
                const sliceWidth = canvas.width * 1.0 / bufferLength;
                let x = 0;

                for (let i = 0; i < bufferLength; i++) {
                    // 振幅資料是 Uint8 (0 到 255 之間)
                    const v = dataArray[i] / 128.0; // 歸一化到 0 ~ 2 之間
                    // 將歸一化後的數值對應到 Canvas 的 Y 軸高度 (喇叭在中間震動)
                    const y = v * canvas.height / 2;

                    if (i === 0) {
                        canvasCtx.moveTo(x, y);
                    } else {
                        canvasCtx.lineTo(x, y);
                    }

                    x += sliceWidth;
                }

                // 最後一筆畫回 Canvas 右側中央
                canvasCtx.lineTo(canvas.width, canvas.height / 2);
                canvasCtx.stroke();
            }

            // --- 監聽 UI 更新 (已簡化，保持上一題邏輯) ---
            ['p1-decay', 'p2-decay', 'tri-decay', 'noise-decay'].forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.addEventListener('input', (e) => {
                        document.getElementById(`${id}-val`).innerText = e.target.value + 's';
                    });
                }
            });

            // --- 輔助函式：產生 Pulse Wave ---
            function createPulseWave(duty) {
                const real = new Float32Array(32);
                const imag = new Float32Array(32);
                real[0] = 0;
                imag[0] = 0;
                for (let n = 1; n < 32; n++) {
                    imag[n] = (2 / (n * Math.PI)) * Math.sin(n * Math.PI * duty);
                }
                return audioCtx.createPeriodicWave(real, imag);
            }

            // --- 核心播放邏輯 (以 CH1 Pulse 1 為示意範例) ---
            function playNESNote(freq) {
                if (!audioCtx || !analyser) return;
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const now = audioCtx.currentTime;

                // 通道 1: Pulse 1
                if (document.getElementById('p1-enable')?.checked) {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    const duty = parseFloat(document.getElementById('p1-duty').value);
                    const decay = parseFloat(document.getElementById('p1-decay').value);
                    osc.setPeriodicWave(createPulseWave(duty));
                    osc.frequency.setValueAtTime(freq, now);
                    gain.gain.setValueAtTime(0.3, now);
                    gain.gain.linearRampToValueAtTime(0, now + decay);

                    // --- E. 關鍵接線變動：osc -> gain -> analyser -> destination ---
                    osc.connect(gain);
                    gain.connect(analyser); // 先接到分析器
                    analyser.connect(audioCtx.destination); // 分析器再接到喇叭

                    osc.start(now);
                    osc.stop(now + decay);
                }

                // (這裡省略 CH2-CH4 的播放代碼，因為接線方式完全一致)
                // --- 通道 2: Pulse 2 ---
                if (document.getElementById('p2-enable').checked) {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    const duty = parseFloat(document.getElementById('p2-duty').value);
                    const decay = parseFloat(document.getElementById('p2-decay').value);

                    osc.setPeriodicWave(createPulseWave(duty));
                    // 稍微降個幾音分(Detune)或改變頻率，重現 Nescaline 豐富度
                    osc.frequency.setValueAtTime(freq * 1.003, now);

                    gain.gain.setValueAtTime(0.3, now);
                    gain.gain.linearRampToValueAtTime(0, now + decay);

                    // --- E. 關鍵接線變動：osc -> gain -> analyser -> destination ---
                    osc.connect(gain);
                    gain.connect(analyser); // 先接到分析器
                    analyser.connect(audioCtx.destination); // 分析器再接到喇叭

                    osc.start(now);
                    osc.stop(now + decay);
                }

                // --- 通道 3: Triangle (低音，通常降一個八度) ---
                if (document.getElementById('tri-enable').checked) {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    const decay = parseFloat(document.getElementById('tri-decay').value);

                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(freq / 2, now); // 降八度模擬 NES Bass

                    gain.gain.setValueAtTime(0.4, now);
                    gain.gain.linearRampToValueAtTime(0, now + decay);

                    // --- E. 關鍵接線變動：osc -> gain -> analyser -> destination ---
                    osc.connect(gain);
                    gain.connect(analyser); // 先接到分析器
                    analyser.connect(audioCtx.destination); // 分析器再接到喇叭

                    osc.start(now);
                    osc.stop(now + decay);
                }

                // --- 通道 4: Noise ---
                if (document.getElementById('noise-enable').checked) {
                    const decay = parseFloat(document.getElementById('noise-decay').value);
                    const type = document.getElementById('noise-type').value;

                    const bufferSize = audioCtx.sampleRate * decay;
                    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                    const data = buffer.getChannelData(0);

                    // 根據類型產生不同的 8-bit 顆粒感雜音
                    let lastOut = 0.0;
                    for (let i = 0; i < bufferSize; i++) {
                        const white = Math.random() * 2 - 1;
                        if (type === 'metallic') {
                            // 金屬感短週期噪訊：利用簡易下採樣與持值產生顆粒感
                            if (i % 8 === 0) lastOut = white;
                            data[i] = lastOut;
                        } else {
                            data[i] = white;
                        }
                    }

                    const noiseNode = audioCtx.createBufferSource();
                    const gain = audioCtx.createGain();
                    noiseNode.buffer = buffer;

                    gain.gain.setValueAtTime(0.4, now);
                    gain.gain.linearRampToValueAtTime(0, now + decay);

                    // --- E. 關鍵接線變動：osc -> gain -> analyser -> destination ---
                    noiseNode.connect(gain);
                    gain.connect(analyser); // 先接到分析器
                    analyser.connect(audioCtx.destination); // 分析器再接到喇叭

                    noiseNode.start(now);
                    noiseNode.stop(now + decay);
                }
            }
        });
