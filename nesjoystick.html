<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NES 網頁動態觸控搖桿測試</title>
    <link rel="stylesheet" href="ayakit.css">
    <link rel="stylesheet" href="nesjoystick.css">
</head>
<body>
    <a id="backBtn" href="index.html">🏠</a>
    <div id="debug-panel">
        <h2>NES 搖桿測試數據(適用觸控裝置)</h2>
        <div class="data-grid">
            <div id="debug-info">搖桿狀態: <span id="val-joy-status" style="color: #ff5555;">放開</span></div>
            <div id="debug-info">搖桿向量: <span id="val-joy-vector">X: 0.00, Y: 0.00</span></div>
            <div id="debug-info">搖桿方向: <span id="val-joy-dir" style="color: #55ff55;">NONE</span></div>
            <div id="debug-info">A 鍵狀態: <span id="val-btn-a">0</span></div>
            <div id="debug-info">B 鍵狀態: <span id="val-btn-b">0</span></div>
            <div id="debug-info">SELECT: <span id="val-btn-select">0</span></div>
            <div id="debug-info">START: <span id="val-btn-start">0</span></div>
        </div>
    </div>

    <div id="touch-container">
        
        <div id="joystick-zone"></div>
        
        <div id="joystick-base">
            <div id="joystick-stick"></div>
        </div>

        <div id="buttons-zone">
            <div class="action-btn" id="btn-b">B</div>
            <div class="action-btn" id="btn-a">A</div>
        </div>

        <div id="system-buttons">
            <div class="sys-btn" id="btn-select"></div>
            <div class="sys-btn" id="btn-start"></div>
        </div>

    </div>
    <script src="ayakit.js"></script>
    <script src="nesjoystick.js"></script>
    <script>
        
    </script>
</body>
</html>
