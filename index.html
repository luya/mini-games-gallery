<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 JS 小遊戲時光屋</title>
    <style>
        /* 基礎變數設定，方便你以後改顏色 */
        :root {
            --bg-color: #f4f7f6;
            --text-color: #333;
            --card-bg: #ffffff;
            --primary-color: #4a90e2;
            --hover-transform: translateY(-5px);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 頂部標題區 */
        header {
            text-align: center;
            padding: 40px 20px;
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            color: #2c3e50;
            letter-spacing: 2px;
        }

        header p {
            margin: 10px 0 0 0;
            color: #7f8c8d;
            font-size: 1.1rem;
        }

        /* 遊戲方塊網格容器 */
        .game-grid {
            display: grid;
            /* 自動填滿，每個方塊最小 280px，最大均分 */
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1200px;
            width: 90%;
            padding: 20px 0 60px 0;
        }

        /* 單個遊戲方塊連結 */
        .game-card {
            background-color: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(0,0,0,0.03);
        }

        /* 滑鼠懸停特效 */
        .game-card:hover {
            transform: var(--hover-transform);
            box-shadow: 0 12px 25px rgba(0,0,0,0.15);
        }

        /* 遊戲縮圖預留區 */
        .game-image {
            height: 160px;
            background-color: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            transition: background-color 0.3s ease;
        }

        /* 給不同方塊一點隨機的亮色主題（可自由修改或換成圖片） */
        .card-1 .game-image { background-color: #ff7675; }
        .card-2 .game-image { background-color: #74b9ff; }
        .card-3 .game-image { background-color: #55efc4; }
        .card-4 .game-image { background-color: #ffeaa7; }
        .card-5 .game-image { background-color: #a29bfe; }
        .card-6 .game-image { background-color: #fab1a0; }

        /* 遊戲文字介紹區 */
        .game-info {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .game-title {
            margin: 0 0 10px 0;
            font-size: 1.3rem;
            color: #2d3436;
            font-weight: bold;
        }

        .game-desc {
            margin: 0;
            font-size: 0.95rem;
            color: #636e72;
            line-height: 1.5;
            flex-grow: 1;
        }

        /* 進入遊戲的小標籤 */
        .game-action {
            margin-top: 15px;
            font-size: 0.9rem;
            color: var(--primary-color);
            font-weight: bold;
            text-align: right;
        }
    </style>
</head>
<body>

    <header>
        <h1>JS 遊戲大廳</h1>
        <p>點選下方方塊，開啟你的遊戲冒險！</p>
    </header>

    <main class="game-grid">

        <a href="clickit.html" class="game-card card-1">
            <div class="game-image">👆</div>
            <div class="game-info">
                <div class="game-title">單人連擊練習</div>
                <div class="game-desc">加強你的遊戲指力！</div>
                <div class="game-action">開始遊戲 →</div>
            </div>
        </a>

        <a href="#" class="game-card card-2">
            <div class="game-image">🧱</div>
            <div class="game-info">
                <div class="game-title">俄羅斯方塊</div>
                <div class="game-desc">經典消除遊戲，挑戰你的反應與空間堆疊邏輯，看看你能拿幾分。</div>
                <div class="game-action">開始遊戲 →</div>
            </div>
        </a>

        <a href="#" class="game-card card-3">
            <div class="game-image">❌</div>
            <div class="game-info">
                <div class="game-title">井字棋 (OOXX)</div>
                <div class="game-desc">雙人對戰或與超強 AI 進行對決，先連成一線的人就贏了！</div>
                <div class="game-action">開始遊戲 →</div>
            </div>
        </a>

        <a href="#" class="game-card card-4">
            <div class="game-image">🔢</div>
            <div class="game-info">
                <div class="game-title">2048</div>
                <div class="game-desc">滑動方塊合併相同數字，想辦法湊出傳說中的「2048」方塊。</div>
                <div class="game-action">開始遊戲 →</div>
            </div>
        </a>

        <a href="#" class="game-card card-5">
            <div class="game-image">💣</div>
            <div class="game-info">
                <div class="game-title">經典踩地雷</div>
                <div class="game-desc">考驗邏輯與運氣，點開所有安全方塊並插旗標記出所有地雷。</div>
                <div class="game-action">開始遊戲 →</div>
            </div>
        </a>

        <a href="#" class="game-card card-6">
            <div class="game-image">❓</div>
            <div class="game-info">
                <div class="game-title">神秘新遊戲</div>
                <div class="game-desc">新遊戲正在緊鑼密鼓開發中，敬請期待全新玩法上線！</div>
                <div class="game-action">開始遊戲 →</div>
            </div>
        </a>

    </main>
    </body>
</html>
