<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極簡方塊躲避戰</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            color: #333;
        }

        #ui-container {
            text-align: center;
            margin-bottom: 20px;
            width: 400px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .score-box {
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 1px;
        }

        #game-container {
            position: relative;
            width: 400px;
            height: 500px;
            background-color: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            overflow: hidden;
            cursor: none;
        }

        #player {
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: #333;
            border-radius: 2px;
            bottom: 30px;
            left: 190px;
            transition: transform 0.1s ease;
        }

        .obstacle {
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: #bbbbbb;
            border-radius: 2px;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: all 0.3s ease;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 400;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        p {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 25px;
        }

        button {
            padding: 10px 24px;
            background-color: #333;
            color: #fff;
            border: none;
            border-radius: 2px;
            font-size: 0.9rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #555;
        }

        .hide {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <div class="score-box">SCORE: <span id="score">0</span></div>
        <div class="score-box">BEST: <span id="best-score">0</span></div>
    </div>

    <div id="game-container">
        <div id="player"></div>
        
        <div id="overlay">
            <h1 id="title">MINIMAL DODGE</h1>
            <p id="subtitle">左右移動滑鼠以躲避下落的方塊</p>
            <button id="start-btn">START</button>
        </div>
    </div>

    <script>
        const container = document.getElementById('game-container');
        const player = document.getElementById('player');
        const scoreDisplay = document.getElementById('score');
        const bestScoreDisplay = document.getElementById('best-score');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('start-btn');
        const title = document.getElementById('title');
        const subtitle = document.getElementById('subtitle');

        let gameActive = false;
        let score = 0;
        let bestScore = 0;
        let obstacles = [];
        let spawnInterval;
        let gameLoopId;
        let playerX = 190;
        let obstacleSpeed = 4;
        let spawnRate = 400; // 毫秒

        // 監聽滑鼠移動
        container.addEventListener('mousemove', (e) => {
            if (!gameActive) return;
            const rect = container.getBoundingClientRect();
            // 計算滑鼠在遊戲區域內的相對 X 座標，並讓方塊中心對準滑鼠
            playerX = e.clientX - rect.left - 10;
            
            // 邊界限制
            if (playerX < 0) playerX = 0;
            if (playerX > 380) playerX = 380;
            
            player.style.left = playerX + 'px';
        });

        // 開始遊戲
        startBtn.addEventListener('click', startGame);

        function startGame() {
            // 初始化數據
            score = 0;
            obstacleSpeed = 4;
            spawnRate = 400;
            scoreDisplay.textContent = score;
            
            // 清除舊障礙物
            obstacles.forEach(obs => obs.element.remove());
            obstacles = [];

            // 隱藏選單
            overlay.classList.add('hide');
            gameActive = true;

            // 啟動生成與遊戲主循環
            clearInterval(spawnInterval);
            cancelAnimationFrame(gameLoopId);
            
            spawnObstacles();
            gameLoop();
        }

        // 動態調整難度並生成障礙物
        function spawnObstacles() {
            spawnInterval = setInterval(() => {
                if (!gameActive) return;

                const obsElement = document.createElement('div');
                obsElement.classList.add('obstacle');
                
                const x = Math.random() * 380;
                obsElement.style.left = x + 'px';
                obsElement.style.top = '0px';
                container.appendChild(obsElement);

                obstacles.push({
                    element: obsElement,
                    x: x,
                    y: 0
                });

                // 隨著分數提高難度
                if (score > 0 && score % 10 === 0 && obstacleSpeed < 10) {
                    obstacleSpeed += 0.5;
                }
            }, spawnRate);
        }

        // 遊戲主循環 (處理移動與碰撞偵測)
        function gameLoop() {
            if (!gameActive) return;

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.y += obstacleSpeed;
                obs.element.style.top = obs.y + 'px';

                // 碰撞偵測 (玩家固定在 bottom: 30px，即 y = 450 ~ 470)
                if (obs.y >= 430 && obs.y <= 470) {
                    if (obs.x + 20 > playerX && obs.x < playerX + 20) {
                        gameOver();
                        return;
                    }
                }

                // 超出邊界，得分並移除
                if (obs.y > 500) {
                    obs.element.remove();
                    obstacles.splice(i, 1);
                    score++;
                    scoreDisplay.textContent = score;
                }
            }

            gameLoopId = requestAnimationFrame(gameLoop);
        }

        // 遊戲結束
        function gameOver() {
            gameActive = false;
            clearInterval(spawnInterval);
            cancelAnimationFrame(gameLoopId);

            if (score > bestScore) {
                bestScore = score;
                bestScoreDisplay.textContent = bestScore;
            }

            title.textContent = "GAME OVER";
            subtitle.textContent = `最終得分：${score}`;
            startBtn.textContent = "TRY AGAIN";
            overlay.classList.remove('hide');
        }
    </script>
</body>
</html>
