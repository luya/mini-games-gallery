<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet"> 
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎨</text></svg>">
    <title>極簡像素小畫家</title>
    <link rel="stylesheet" href="ayakit.css">
    <style>
        body {
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #333;
            /* width: 100%; */
            /* height: 100%; */
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        /* 讓外層容器可以隨視窗縮放 */
        .container {
            align-items: center;
            justify-content: center;
            display: flex;
            gap: 20px;
            background: white;
            padding: 20px;
            border-radius: 6px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            height: 95%;
            width: 95%;
            /* 寬度隨視窗縮放 */
            /* max-width: 900px; */
            /* 設定最大寬度，避免寬螢幕下太大 */
            user-select: none;
        }

        .toolbox {
            display: flex;
            flex-direction: column;
            gap: 15px;
            /* width: 20%px; */
        }

        .tool-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: bold;
            font-size: 14px;
        }

        /* 調色盤 */
        .palette {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 4px;
        }

        .color-swatch {
            width: 16px;
            height: 16px;
            border-radius: 4px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: transform 0.1s;
            border-color: #bababa;
        }

        .color-swatch:hover {
            border-color: #ff0066;
            transform: scale(1.1);
        }

        .color-swatch.active {
            border-color: #8d6aff;
            box-shadow: 0 0 4px rgba(0, 0, 0, 0.3);
        }

        input[type="color"] {
            width: 100%;
            height: 40px;
            border: 1px solid #ccc;
            border-radius: 6px;
            cursor: pointer;
        }



        canvas {
            flex: 1;
            /* 讓 Canvas 自動填滿容器剩餘空間 */
            min-height: 512px;
            min-width: 512px;
            /* 限制最小寬度，避免手機版縮太小 */
            aspect-ratio: 1 / 1;
            /* 強制保持 1:1 完美正方形 */
            border: 2px solid #ddd;
            border-radius: 4px;
            cursor: crosshair;
            background-color: #fff;

            /* 關鍵屬性：放大時不模糊，保持乾淨的像素邊緣 */
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
    </style>
</head>

<body>
    <a id="backBtn" href="index.html">🏠</a>
    <h1>像素小畫家 🎨</h1>

    <div id="container" class="container">
        <!-- 工具箱 -->
        <div class="toolbox">
            <div class="tool-group">
                <label style="font-size: 1rem;">自訂顏色</label>
                <input type="color" id="customColor" value="#2e222f">
            </div>

            <div class="tool-group">
                <label style="font-size: 1rem;">經典調色盤</label>
                <select id="palettes" class="select-base">
                    <option value="Resurrect64">Resurrect 64</option>
                    <option value="AAP64">AAP 64</option>
                    <option value="Endesga64">Endesga 64</option>
                    <option value="Journey64">Journey 64</option>
                    <option value="Gameboy">Gameboy</option>
                    <option value="BW">1Bit</option>

                </select>
                <div class="palette" id="palette"></div>
            </div>

            <div class="tool-group">
                <label style="font-size: 1rem;">網格大小 (解析度)</label>
                <select id="gridSize" class="select-base">
                    <option value="8">8 x 8</option>
                    <option value="16">16 x 16</option>
                    <option value="32" selected>32 x 32</option>
                    <option value="64">64 x 64</option>
                    <option value="128">128 x 128</option>
                    <!-- <option value="256">256 x 256</option> -->
                    <!-- <option value="512">512 x 512</option> -->
                </select>
            </div>

            <div class="tool-group">
                <label style="font-size: 1rem;">設定</label>
                <button id="toggleFullScreen" class="button-base">全螢幕</button>
                <button id="toggleGrid" class="button-base">隱藏網格線</button>
                <button id="clearBtn" class="button-base">全部清除</button>
                <div class="tool-group">
                    <label style="font-size: 1rem;">
                        <input type="checkbox" id="pixelPerfectToggle">
                        簡易像素完美
                    </label>
                </div>
            </div>
            <div class="tool-group">
                <label style="font-size: 1rem;">畫布顏色</label>
                <input type="color" id="customBG" value="#FFFFFF">
            </div>
            <div class="tool-group">
                <label style="font-size: 1rem;">匯出作品</label>
                <button id="downloadPngBtn" class="button-base">下載PNG</button>
            </div>

        </div>

        <!-- 畫布 -->
        <canvas id="paintCanvas" style="background-color: #ffffff;"></canvas>
    </div>
    
    <script src="ayakit.js"></script>
    <script>
        // 1. 初始化 DOM 元素
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const customColorInput = document.getElementById('customColor');
        const paletteSelector = document.getElementById('palettes');
        const paletteContainer = document.getElementById('palette');
        const customBG = document.getElementById('customBG');
        const gridSizeSelect = document.getElementById('gridSize');
        const toggleFullScreenBtn = document.getElementById('toggleFullScreen');
        const toggleGridBtn = document.getElementById('toggleGrid');
        const clearBtn = document.getElementById('clearBtn');
        const pixelPerfectToggle = document.getElementById('pixelPerfectToggle');

        // 2. 預設參數與狀態
        const palettes = {
            Resurrect64: [
                '#2e222f', '#3e3546', '#625565', '#966c6c', '#ab947a', '#694f62',
                '#7f708a', '#9babb2', '#c7dcd0', '#ffffff', '#6e2727', '#b33831',
                '#ea4f36', '#f57d4a', '#ae2334', '#e83b3b', '#fb6b1d', '#f79617',
                '#f9c22b', '#7a3045', '#9e4539', '#cd683d', '#e6904e', '#fbb954',
                '#4c3e24', '#676633', '#a2a947', '#d5e04b', '#fbff86', '#165a4c',
                '#239063', '#1ebc73', '#91db69', '#cddf6c', '#313638', '#374e4a',
                '#547e64', '#92a984', '#b2ba90', '#0b5e65', '#0b8a8f', '#0eaf9b',
                '#30e1b9', '#8ff8e2', '#323353', '#484a77', '#4d65b4', '#4d9be6',
                '#8fd3ff', '#45293f', '#6b3e75', '#905ea9', '#a884f3', '#eaaded',
                '#753c54', '#a24b6f', '#cf657f', '#ed8099', '#831c5d', '#c32454',
                '#f04f78', '#f68181', '#fca790', '#fdcbb0'
            ],
            AAP64: [
                '#060608', '#141013', '#3b1725', '#73172d', '#b4202a', '#df3e23',
                '#fa6a0a', '#f9a31b', '#ffd541', '#fffc40', '#d6f264', '#9cdb43',
                '#59c135', '#14a02e', '#1a7a3e', '#24523b', '#122020', '#143464',
                '#285cc4', '#249fde', '#20d6c7', '#a6fcdb', '#ffffff', '#fef3c0',
                '#fad6b8', '#f5a097', '#e86a73', '#bc4a9b', '#793a80', '#403353',
                '#242234', '#221c1a', '#322b28', '#71413b', '#bb7547', '#dba463',
                '#f4d29c', '#dae0ea', '#b3b9d1', '#8b93af', '#6d758d', '#4a5462',
                '#333941', '#422433', '#5b3138', '#8e5252', '#ba756a', '#e9b5a3',
                '#e3e6ff', '#b9bffb', '#849be4', '#588dbe', '#477d85', '#23674e',
                '#328464', '#5daf8d', '#92dcba', '#cdf7e2', '#e4d2aa', '#c7b08b',
                '#a08662', '#796755', '#5a4e44', '#423934'
            ],
            Endesga64: [
                '#ff0040', '#131313', '#1b1b1b', '#272727', '#3d3d3d', '#5d5d5d',
                '#858585', '#b4b4b4', '#ffffff', '#c7cfdd', '#92a1b9', '#657392',
                '#424c6e', '#2a2f4e', '#1a1932', '#0e071b', '#1c121c', '#391f21',
                '#5d2c28', '#8a4836', '#bf6f4a', '#e69c69', '#f6ca9f', '#f9e6cf',
                '#edab50', '#e07438', '#c64524', '#8e251d', '#ff5000', '#ed7614',
                '#ffa214', '#ffc825', '#ffeb57', '#d3fc7e', '#99e65f', '#5ac54f',
                '#33984b', '#1e6f50', '#134c4c', '#0c2e44', '#00396d', '#0069aa',
                '#0098dc', '#00cdf9', '#0cf1ff', '#94fdff', '#fdd2ed', '#f389f5',
                '#db3ffd', '#7a09fa', '#3003d9', '#0c0293', '#03193f', '#3b1443',
                '#622461', '#93388f', '#ca52c9', '#c85086', '#f68187', '#f5555d',
                '#ea323c', '#c42430', '#891e2b', '#571c27'
            ],
            Journey64: [
                '#050914', '#110524', '#3b063a', '#691749', '#9c3247', '#d46453',
                '#f5a15d', '#ffcf8e', '#ff7a7d', '#ff417d', '#d61a88', '#94007a',
                '#42004e', '#220029', '#100726', '#25082c', '#3d1132', '#73263d',
                '#bd4035', '#ed7b39', '#ffb84a', '#fff540', '#c6d831', '#77b02a',
                '#429058', '#2c645e', '#153c4a', '#052137', '#0e0421', '#0c0b42',
                '#032769', '#144491', '#488bd4', '#78d7ff', '#b0fff1', '#faffff',
                '#c7d4e1', '#928fb8', '#5b537d', '#392946', '#24142c', '#0e0f2c',
                '#132243', '#1a466b', '#10908e', '#28c074', '#3dff6e', '#f8ffb8',
                '#f0c297', '#cf968c', '#8f5765', '#52294b', '#0f022e', '#35003b',
                '#64004c', '#9b0e3e', '#d41e3c', '#ed4c40', '#ff9757', '#d4662f',
                '#9c341a', '#691b22', '#450c28', '#2d002e'
            ],
            Gameboy: [
                '#081820',
                '#346856',
                '#88c070',
                '#e0f8d0'
            ],
            BW: [
                '#000000',
                '#FFFFFF'
            ]


        };
        let presetColors = palettes['Resurrect64'];

        let currentColor = '#2e222f';
        let gridSize = parseInt(gridSizeSelect.value);
        let showGrid = true;
        let isDrawing = false;
        customColorInput.value = currentColor;
        let lastCol = null;
        let lastRow = null;
        let currentStrokePixels = new Set(); // 記錄當前這一筆畫過的所有座標字串，例如 "row,col"
        let usePixelPerfect = pixelPerfectToggle.checked;

        // 監聽開關變化
        pixelPerfectToggle.addEventListener('change', (e) => {
            usePixelPerfect = e.target.checked;
        });

        // 用來儲存畫布狀態的 2D 陣列 (避免每次重新調整網格大小或隱藏格線時畫面消失)
        let pixelData = [];

        // 3. 初始化像素資料陣列
        function initPixelData() {
            pixelData = Array(gridSize).fill(null).map(() => Array(gridSize).fill(null));
        }

        // 4. 初始化畫布的內建模擬解析度（這代表畫布內部的畫質，與 CSS 顯示大小無關）
        // 為了讓繪製出來的線條最細緻，這裡可以設固定值（例如 800），其餘交給 CSS 去縮放
        canvas.width = 1024;
        canvas.height = 1024;

        // 5. 重新調整繪圖（draw）邏輯
        function draw() {
            // if (canvas.width>viewportWidth){canvas.width=viewportWidth;}
            // if (canvas.height>viewportWidth){canvas.height=viewportWidth;}
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const cellSize = canvas.width / gridSize; // 依據 800 解析度來算格尺寸

            // 繪製像素
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    if (pixelData[r][c]) {
                        ctx.fillStyle = pixelData[r][c];
                        ctx.fillRect(c * cellSize, r * cellSize, cellSize, cellSize);
                    }
                }
            }

            // 繪製網格線
            if (showGrid) {
                ctx.strokeStyle = '#e8e8e8';
                // 為了不讓網格線隨畫布變大而變粗，設定一個合適的比例
                ctx.lineWidth = canvas.width / 500;
                for (let i = 0; i <= gridSize; i++) {
                    ctx.beginPath();
                    ctx.moveTo(i * cellSize, 0);
                    ctx.lineTo(i * cellSize, canvas.height);
                    ctx.stroke();

                    ctx.beginPath();
                    ctx.moveTo(0, i * cellSize);
                    ctx.lineTo(canvas.width, i * cellSize);
                    ctx.stroke();
                }
            }
        }

        // 6. 關鍵：點擊填色邏輯（完美支援任意縮放的畫布！）
        function paint(e) {
            const rect = canvas.getBoundingClientRect();

            // 1. 取得滑鼠相對於 Canvas「網頁實際顯示大小 (clientWidth)」的座標
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;

            // 2. 計算目前網頁上，每一個格子的「實際物理寬度」
            const actualCellSize = canvas.clientWidth / gridSize;

            // 3. 計算點擊到哪一個網格（除以實際物理格寬，並無條件捨去）
            const col = Math.floor(clickX / actualCellSize);
            const row = Math.floor(clickY / actualCellSize);

            // 安全機制：確保沒超出陣列邊界
            if (col >= 0 && col < gridSize && row >= 0 && row < gridSize) {
                pixelData[row][col] = e.buttons === 2 ? null : currentColor;
                draw();
            }
        }

        // 6a. 當瀏覽器視窗縮放時，自動重繪網格（保持畫面正確比例）
        window.addEventListener('resize', draw);

        // 7. 動態產生調色盤        
        paletteSelector.addEventListener('change', (e) => {
            presetColors = palettes[e.target.value];
            buildPalette();
        });
        // 7a. 動態產生調色盤
        function buildPalette() {
            paletteContainer.innerHTML = '';
            presetColors.forEach(color => {
                const swatch = document.createElement('div');
                swatch.classList.add('color-swatch');
                swatch.style.backgroundColor = color;
                if (color === currentColor) swatch.classList.add('active');

                swatch.addEventListener('click', () => {
                    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
                    swatch.classList.add('active');
                    currentColor = color;
                    customColorInput.value = color;
                });
                paletteContainer.appendChild(swatch);
            });
        }

        // 7. 綁定事件監聽器

        // const drawstart = (e) => {
        //     // if (e.type == 'touchstart') {e.preventDefault();}
        //     isDrawing = true;
        //     if (!usePixelPerfect) {
        //         paint(e);
        //     } else {
        //         const { col, row } = getGridCoords(e);

        //         lastCol = col;
        //         lastRow = row;
        //         currentStrokePixels.clear(); // 新的一筆畫開始，清空紀錄

        //         const drawColor = e.buttons === 2 ? null : currentColor;
        //         drawLine(row, col, row, col, drawColor); // 畫下第一點
        //         draw();
        //     }

        // };

        // canvas.addEventListener('pointerdown', drawstart);
        // canvas.addEventListener('touchstart', drawstart);

        canvas.addEventListener('pointerdown', (e) => {
            isDrawing = true;
            if (!usePixelPerfect) {
                paint(e);
            } else {
                const { col, row } = getGridCoords(e);

                lastCol = col;
                lastRow = row;
                currentStrokePixels.clear(); // 新的一筆畫開始，清空紀錄

                const drawColor = e.buttons === 2 ? null : currentColor;
                drawLine(row, col, row, col, drawColor); // 畫下第一點
                draw();
            }

        });

        canvas.addEventListener('pointermove', (e) => {
            if (!usePixelPerfect) {
                if (isDrawing) paint(e);
            } else {
                if (!isDrawing) return;
                const { col, row } = getGridCoords(e);

                // 座標沒變就不重複計算
                if (col === lastCol && row === lastRow) return;

                const drawColor = e.buttons === 2 ? null : currentColor;

                // 連接上一點與當前點，內部會自動進行 8 格過濾
                drawLine(lastRow, lastCol, row, col, drawColor);

                lastCol = col;
                lastRow = row;
                draw();
            }
        });

        window.addEventListener('pointerup', () => {
            isDrawing = false;
            if (usePixelPerfect) {
                currentStrokePixels.clear();
            }
        });

        // 阻擋畫布上的右鍵選單，方便用右鍵當橡皮擦
        canvas.addEventListener('contextmenu', e => e.preventDefault());

        // 自訂顏色選擇器變更
        customColorInput.addEventListener('input', (e) => {
            currentColor = e.target.value;
            // 取消調色盤中其他按鈕的 active 狀態
            document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
        });

        customBG.addEventListener('input', (e) => {
            const canvasBGColor = e.target.value;
            canvas.style.backgroundColor = canvasBGColor;
            draw();
        });

        // 解析度切換
        gridSizeSelect.addEventListener('change', (e) => {
            if (confirm('切換網格大小會清空目前畫面，確定要切換嗎？')) {
                gridSize = parseInt(e.target.value);
                initPixelData();
                draw();
            } else {
                gridSizeSelect.value = gridSize; // 恢復原值
            }
        });

        // 網格線開關
        toggleFullScreenBtn.addEventListener('click', () => {
            const isFullscreen = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement;

            if (!isFullscreen) {
                AyaKits.launchFullScreen(document.documentElement);
            } else {
                AyaKits.exitFullScreen();
            }
        });

        toggleGridBtn.addEventListener('click', () => {
            showGrid = !showGrid;
            toggleGridBtn.textContent = showGrid ? '隱藏網格線' : '顯示網格線';
            draw();
        });

        // 清空畫布
        clearBtn.addEventListener('click', () => {
            if (confirm('確定要清空畫布嗎？')) {
                initPixelData();
                draw();
            }
        });

        // 8. 啟動小畫家
        initPixelData();
        buildPalette();
        draw();

        // 取得下載按鈕元素
        const downloadPngBtn = document.getElementById('downloadPngBtn');

        downloadPngBtn.addEventListener('click', () => {
            // 1. 動態在記憶體中建立一個「隱藏的 Canvas」
            const offscreenCanvas = document.createElement('canvas');
            const offscreenCtx = offscreenCanvas.getContext('2d');

            // 2. 將這個小畫布的尺寸設為「剛好等於網格大小」（例如 32x32）
            offscreenCanvas.width = gridSize;
            offscreenCanvas.height = gridSize;

            // 3. 將 pixelData 的顏色資料 1:1 畫到小畫布上
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    if (pixelData[r][c]) {
                        offscreenCtx.fillStyle = pixelData[r][c];
                        // 每個像素格的大小剛好是 1x1 像素
                        offscreenCtx.fillRect(c, r, 1, 1);
                    }
                }
            }

            // 4. 從這個「像素原寸」的畫布匯出圖片
            const dataURL = offscreenCanvas.toDataURL('image/png');

            // 5. 觸發下載
            const link = document.createElement('a');
            link.download = `pixel-art-${gridSize}x${gridSize}.png`;
            link.href = dataURL;
            link.click();
        });

        // 將座標轉換為 Set 的 Key 值（格式如 "5,12"）
        const getCoordKey = (r, c) => `${r},${c}`;

        // 核心：偵測周圍 8 格來判斷是否為「轉角贅肉」
        function isDoublePixel(r, c) {
            // 定義與目前這格相鄰的 4 個正向格（上下左右）
            const orthos = [
                { r: r - 1, c: c }, // 上
                { r: r + 1, c: c }, // 下
                { r: r, c: c - 1 }, // 左
                { r: r, c: c + 1 }  // 右
            ];

            // 定義與目前這格相鄰的 4 個對角格
            const diagonals = [
                { r: r - 1, c: c - 1 }, // 左上
                { r: r - 1, c: c + 1 }, // 右上
                { r: r + 1, c: c - 1 }, // 左下
                { r: r + 1, c: c + 1 }  // 右下
            ];

            // 1. 檢查正向格（上下左右）是否有任何一格是剛剛才畫過的
            const hasOrthoNeighbor = orthos.some(p => currentStrokePixels.has(getCoordKey(p.r, p.c)));

            // 2. 檢查對角格是否有任何一格是剛剛才畫過的
            const hasDiagNeighbor = diagonals.some(p => currentStrokePixels.has(getCoordKey(p.r, p.c)));

            // 如果正向和斜向都有相鄰的「同筆畫像素」，就代表這格在轉角處，是贅肉！
            return hasOrthoNeighbor && hasDiagNeighbor;
        }

        // Bresenham 直線連線演算法（保持簡單連線，防漏格）
        function drawLine(r0, c0, r1, c1, color) {
            const dr = Math.abs(r1 - r0);
            const dc = Math.abs(c1 - c0);
            const sr = r0 < r1 ? 1 : -1;
            const sc = c0 < c1 ? 1 : -1;
            let err = (dc > dr ? dc : -dr) / 2;

            let r = r0;
            let c = c0;

            while (true) {
                const key = getCoordKey(r, c);

                if (color === null) {
                    // 橡皮擦模式：直接擦除
                    pixelData[r][c] = null;
                } else {
                    // 畫筆模式：
                    // 1. 如果這一格是這一筆劃的起點，直接畫
                    // 2. 如果不是起點，則偵測周圍 8 格，如果不是贅肉才畫
                    if (currentStrokePixels.size === 0 || !isDoublePixel(r, c)) {
                        pixelData[r][c] = color;
                        currentStrokePixels.add(key); // 紀錄這個點已經被畫過
                    }
                }

                if (r === r1 && c === c1) break;
                const e2 = err;
                if (e2 > -dc) { err -= dr; c += sc; }
                if (e2 < dr) { err += dc; r += sr; }
            }
        }
        function getGridCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;
            const actualCellSize = canvas.clientWidth / gridSize;

            return {
                col: Math.floor(clickX / actualCellSize),
                row: Math.floor(clickY / actualCellSize)
            };
        }
    </script>
